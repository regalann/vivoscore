<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivoScore | SofaScore Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --s1: #151821; --brd: #222634; --brand: #3b82f6; --red: #ef4444; --t1: #e6edf3; --t2: #8b949e; --grn: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--t1); overflow: hidden; }
        
        .app { display: flex; width: 100vw; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--s1); border-right: 1px solid var(--brd); padding: 25px; flex-shrink: 0; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; color: white; }
        .logo span { color: var(--brand); }
        .nav-item { padding: 14px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; font-weight: 600; color: var(--t2); transition: 0.2s; }
        .nav-item.active { background: rgba(59,130,246,0.12); color: var(--brand); }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--brd); min-width: 0; }
        .top-nav { padding: 15px 25px; border-bottom: 1px solid var(--brd); display: flex; gap: 10px; overflow-x: auto; background: var(--bg); }
        .league-btn { padding: 10px 18px; border-radius: 12px; border: 1px solid var(--brd); background: var(--s1); color: white; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; transition: 0.2s; }
        .league-btn.active { border-color: var(--brand); color: var(--brand); background: rgba(59,130,246,0.05); }
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; }

        /* Match Row */
        .m-row { display: flex; align-items: center; padding: 18px; background: var(--s1); border-radius: 16px; margin-bottom: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .m-row:hover { border-color: var(--brand); transform: translateY(-2px); }
        .team-logo { width: 24px; height: 24px; object-fit: contain; margin-right: 12px; }

        /* Details Panel */
        .details-panel { width: 400px; background: var(--s1); overflow-y: auto; padding: 30px; display: flex; flex-direction: column; flex-shrink: 0; border-left: 1px solid var(--brd); }
        .stat-bar { height: 6px; background: #242d3d; border-radius: 3px; display: flex; overflow: hidden; margin: 8px 0 18px; }
        .bar-h { background: var(--brand); height: 100%; transition: 0.6s ease-out; }
        .bar-a { background: var(--red); height: 100%; transition: 0.6s ease-out; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="logo">Vivo<span>Score</span></div>
        <div class="nav-item active">⚽ Maçlar</div>
        <div class="nav-item">⭐ Favoriler</div>
    </aside>

    <main class="main-content">
        <div class="top-nav" id="leagueTabs"></div>
        <div class="scroll-area" id="matchList">
            <div style="text-align:center; padding-top:50px; color:var(--t2);">Yükleniyor...</div>
        </div>
    </main>

    <aside class="details-panel" id="matchDetails">
        <div style="text-align:center; padding-top:120px; color:var(--t2); font-size:14px;">
            Analizleri görmek için bir maça tıklayın.
        </div>
    </aside>
</div>

<script>
const App = {
    state: { currentLeague: 'PL', matches: [] },

    async init() {
        this.renderTabs();
        // Sayfa açılır açılmaz Premier League verisini çek
        await this.fetchMatches('PL');
    },

    renderTabs() {
        const leagues = [
            {id:'PL', n:'Premier League'},
            {id:'CL', n:'Champions League'},
            {id:'SA', n:'Serie A'},
            {id:'PD', n:'La Liga'},
            {id:'BL1', n:'Bundesliga'}
        ];
        document.getElementById('leagueTabs').innerHTML = leagues.map(l => 
            `<button class="league-btn ${this.state.currentLeague === l.id ? 'active' : ''}" onclick="App.fetchMatches('${l.id}')">${l.n}</button>`
        ).join('');
    },

    async fetchMatches(leagueId) {
        this.state.currentLeague = leagueId;
        this.renderTabs();
        const listEl = document.getElementById('matchList');
        listEl.innerHTML = '<div style="text-align:center; padding-top:50px;">Veriler çekiliyor...</div>';
        
        try {
            const res = await fetch(`/api/matches/${leagueId}`);
            const data = await res.json();
            
            if (!data.matches || data.matches.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; padding-top:50px; color:var(--t2);">Bu lig için maç bulunamadı.</div>';
                return;
            }
            
            this.state.matches = data.matches;
            this.renderList();
        } catch (e) {
            console.error("Hata:", e);
            listEl.innerHTML = '<div style="text-align:center; padding-top:50px; color:var(--red);">Bağlantı hatası oluştu.</div>';
        }
    },

    renderList() {
        document.getElementById('matchList').innerHTML = this.state.matches.map(m => `
            <div class="m-row" onclick="App.showDetails(${m.id})">
                <div style="width:60px; font-size:12px; font-weight:700; color:var(--t2);">
                    ${new Date(m.utcDate).toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}
                </div>
                <div style="flex:1;">
                    <div style="display:flex; align-items:center; margin-bottom:8px;">
                        <img src="${m.homeTeam.crest}" class="team-logo" onerror="this.src='https://www.sofascore.com/static/images/placeholders/team.png'"> 
                        <span style="font-weight:600;">${m.homeTeam.name}</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <img src="${m.awayTeam.crest}" class="team-logo" onerror="this.src='https://www.sofascore.com/static/images/placeholders/team.png'"> 
                        <span style="font-weight:600;">${m.awayTeam.name}</span>
                    </div>
                </div>
                <div style="text-align:right; font-weight:800; font-size:18px; padding-left:20px;">
                    <div>${m.score.home ?? 0}</div>
                    <div>${m.score.away ?? 0}</div>
                </div>
            </div>
        `).join('');
    },

    async showDetails(matchId) {
        const panel = document.getElementById('matchDetails');
        panel.innerHTML = '<div style="text-align:center; padding-top:50px;">Analizler hazırlanıyor...</div>';
        
        try {
            const res = await fetch(`/api/match-details/${matchId}`);
            const data = await res.json();
            
            let html = `<h2 style="margin-bottom:25px; font-size:20px;">Maç Merkezi</h2>`;

            // İstatistik Çubukları
            if (data.stats && data.stats.statistics && data.stats.statistics.length > 0) {
                // SofaScore verisinde genellikle ilk grup (index 0) ana istatistiklerdir
                const statsItems = data.stats.statistics[0].groups[0].statisticsItems;
                
                statsItems.forEach(item => {
                    const h = parseFloat(item.homeValue) || 0;
                    const a = parseFloat(item.awayValue) || 0;
                    const total = h + a;
                    const hP = total === 0 ? 50 : (h / total) * 100;

                    html += `
                        <div style="margin-bottom:15px;">
                            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;">
                                <span style="font-weight:800;">${item.homeValue}</span>
                                <span style="color:var(--t2); font-size:10px; text-transform:uppercase;">${item.name}</span>
                                <span style="font-weight:800;">${item.awayValue}</span>
                            </div>
                            <div class="stat-bar"><div class="bar-h" style="width:${hP}%"></div><div class="bar-a" style="flex:1"></div></div>
                        </div>
                    `;
                });
            } else {
                html += '<div style="color:var(--t2); font-size:12px;">Detaylı istatistik henüz mevcut değil.</div>';
            }

            // Oyuncu Reytingleri
            if (data.lineups && (data.lineups.home || data.lineups.away)) {
                html += `<h3 style="margin:30px 0 15px; font-size:16px;">Reytingler</h3>`;
                const allPlayers = [...(data.lineups.home?.players || []), ...(data.lineups.away?.players || [])];
                
                const topPlayers = allPlayers
                    .filter(p => p.statistics && p.statistics.rating)
                    .sort((a, b) => b.statistics.rating - a.statistics.rating)
                    .slice(0, 5);

                topPlayers.forEach(p => {
                    const rating = p.statistics.rating;
                    const color = rating >= 7.5 ? '#22c55e' : (rating >= 6.8 ? '#eab308' : '#8b949e');
                    html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--brd);">
                            <span style="font-size:13px; font-weight:600;">${p.player.name}</span>
                            <span style="background:${color}; color:#000; padding:2px 7px; border-radius:5px; font-weight:800; font-size:11px;">${rating}</span>
                        </div>
                    `;
                });
            }

            panel.innerHTML = html;
        } catch (e) {
            panel.innerHTML = '<div style="text-align:center; padding-top:50px;">Veri çekme hatası.</div>';
        }
    }
};

// Uygulamayı başlat
App.init();
</script>
</body>
</html>

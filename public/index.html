<html lang="tr">
<head>

<title>VivoScore</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/supabase/2.38.4/supabase.min.js"></script>
<script>
  if (typeof supabase === 'undefined') { document.write('<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"><\/script>'); }
</script>

<style>
:root {
  --bg: #0d1117; --bg2: #131920; --surface: #161b22; --surface2: #1c2230;
  --border: #21262d; --border2: #30363d; --brand: #3b82f6; --brand-dim: rgba(59,130,246,0.12);
  --green: #22c55e; --green-dim: rgba(34,197,94,0.12); --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
  --yellow: #eab308; --yellow-dim: rgba(234,179,8,0.12); --orange: #f97316;
  --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
  --radius: 12px; --radius-sm: 8px; --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --pitch-line: rgba(255,255,255,0.15); --pitch-border: #3d5a35;
  --court-line: rgba(255,255,255,0.25); --court-border: #bb7744;
}

[data-theme="light"] {
  --bg: #f0f2f5; --bg2: #e8ebef; --surface: #ffffff; --surface2: #f5f6f8;
  --border: #d0d7de; --border2: #bbc0c7; --brand: #2563eb; --brand-dim: rgba(37,99,235,0.1);
  --green: #16a34a; --green-dim: rgba(22,163,74,0.1); --red: #dc2626; --red-dim: rgba(220,38,38,0.1);
  --yellow: #ca8a04; --yellow-dim: rgba(202,138,4,0.1); --orange: #ea580c;
  --text: #1f2328; --text2: #59636e; --text3: #8b949e;
  --pitch-line: rgba(255,255,255,0.35); --pitch-border: #5da050;
  --court-line: rgba(255,255,255,0.45); --court-border: #d28855;
}
[data-theme="light"] ::-webkit-scrollbar-thumb { background: var(--border); }
[data-theme="light"] .logo .v { color: #1f2328; }
[data-theme="light"] .date-btn.active { background: var(--brand); color: #fff; }
[data-theme="light"] .date-btn.active .day { color: rgba(255,255,255,0.8); }
[data-theme="light"] .minute-badge { color: #fff; }
[data-theme="light"] .match-card.faved .team-name { color: var(--text); }

body.hide-odds .match-odds-wrapper { display: none !important; }
body.hide-odds .bet-slip { display: none !important; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%; }
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
img { display: block; } button { font-family: inherit; cursor: pointer; border: none; outline: none; touch-action: manipulation; }
.app { display: flex; height: 100vh; height: 100dvh; width: 100vw; position: relative; overflow: hidden; }
.hide-desktop { display: none !important; }
.mobile-logo-wrap { display: none; }

body.hide-scores .score-num, 
body.hide-scores .detail-score { filter: blur(6px); opacity: 0.5; transition: var(--transition); }
body.hide-scores .score-num:hover, 
body.hide-scores .detail-score:hover { filter: blur(0); opacity: 1; }

.sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 50; }
.sidebar-header { padding: 20px 18px; border-bottom: 1px solid var(--border); }
.logo { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 3px; cursor: pointer; transition: opacity 0.2s; }
.logo:hover { opacity: 0.8; }
.logo .v { color: var(--text); } .logo .s { color: var(--brand); }
.sidebar-nav { padding: 12px 10px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.nav-label { font-size: 12px; font-weight: 800; text-transform: uppercase; color: var(--text3); padding: 0 10px; margin-bottom: 8px; letter-spacing: 1px; margin-top:15px; }
.nav-section { margin-bottom: 12px; } .nav-section:last-child { margin-bottom: 0; border-top: 1px solid var(--border); padding-top: 12px; margin-top:auto; }

.sport-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; color: var(--text2); cursor: pointer; transition: var(--transition); margin-bottom: 2px; }
.sport-item:hover { background: var(--surface2); color: var(--text); } .sport-item.active { background: var(--brand-dim); color: var(--brand); }
.sport-item .flag { font-size: 18px; width: 24px; text-align: center; } 

.user-profile-section { padding: 16px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
.auth-btn { width: 100%; padding: 12px; background: var(--brand); color: #fff; font-weight: 800; font-size: 14px; border-radius: var(--radius-sm); transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;}
.auth-btn:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 12px var(--brand-dim); }
.user-info-box { display: none; align-items: center; gap: 10px; padding: 10px; background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border);}
.user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--brand); display:flex; align-items:center; justify-content:center; background:var(--brand); color:#fff; font-weight:800; font-size:16px; }
.user-details { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-logout { font-size: 11px; color: var(--red); cursor: pointer; margin-top: 2px; font-weight: 600; }
.user-logout:hover { text-decoration: underline; }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); position: relative; }

.topbar { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); gap: 16px; flex-wrap: wrap; }
.tb-row { display: flex; align-items: center; gap: 8px; }
.tb-date-row { flex-shrink: 0; }
.tb-search-row { flex: 1; min-width: 200px; max-width: 400px; }
.tb-actions-row { margin-left: auto; flex-shrink: 0; display: flex; gap: 8px; }

.date-nav { display: flex; align-items: center; gap: 4px; background: var(--surface); border-radius: var(--radius); padding: 3px; border: 1px solid var(--border); transition: 0.3s; }
.date-nav.disabled { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
.date-btn { padding: 8px 14px; border-radius: var(--radius-sm); background: transparent; color: var(--text2); font-size: 14px; font-weight: 600; transition: var(--transition); }
.date-btn:hover { background: var(--surface2); color: var(--text); } .date-btn.active { background: var(--brand); color: white; }
.date-btn .day { display: block; font-size: 12px; color: var(--text3); margin-top: 1px; } .date-btn.active .day { color: rgba(255,255,255,0.7); }
.date-arrow { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 16px; cursor: pointer; transition: var(--transition); }
.date-arrow:hover { background: var(--surface2); color: var(--text); }

.btn-toggle { padding: 8px 16px; border-radius: var(--radius-sm); background: transparent; color: var(--text2); font-size: 14px; font-weight: 700; transition: var(--transition); display:flex; align-items:center; gap:6px; cursor: pointer; border: 1px solid var(--border); }
.btn-toggle:hover { color: var(--text); background:var(--surface2); } 
.live-toggle.active { background: var(--red-dim); color: var(--red); border-color: var(--red); }
.fav-toggle.active { background: var(--yellow-dim); color: var(--yellow); border-color: var(--yellow); }
.pulse-dot-btn { display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--text3); margin-right:2px; }
.live-toggle.active .pulse-dot-btn { background:var(--red); animation: pulse-live 1.5s infinite; }

.match-scroll { flex: 1; overflow-y: auto; padding: 16px 20px; padding-bottom: 150px; }
.league-group { margin-bottom: 20px; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.league-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 15px; font-weight: 700; color: var(--text); background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; border: 1px solid var(--border); border-bottom: none; cursor: pointer; user-select: none; transition: background 0.2s; }
.league-header:hover { background: var(--surface2); }
.league-header img { width: 22px; height: 22px; border-radius: 3px; object-fit: contain; }
.lg-chevron { margin-left: auto; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); color: var(--text3); }
.league-matches { display: block; }
.league-group.collapsed .league-matches { display: none; }
.league-group.collapsed .league-header { border-bottom: 1px solid var(--border); border-radius: var(--radius); }
.league-group.collapsed .lg-chevron { transform: rotate(-90deg); }

.match-card { display: flex; align-items: center; padding: 12px 14px; background: var(--surface); border-left: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transition: var(--transition); position: relative; }
.match-card:last-child { border-radius: 0 0 var(--radius) var(--radius); } .match-card:hover { background: var(--surface2); }
.match-card.selected { background: var(--brand-dim); border-left-color: var(--brand); } .match-card.live-card { border-left: 2px solid var(--green); }
.match-time { width: 56px; flex-shrink: 0; text-align: center; font-size: 13px; font-weight: 600; color: var(--text2); line-height: 1.4; overflow: hidden; }
.match-time.live-time { color: var(--green); }
.minute-badge { display: inline-block; background: var(--green); color: #000; font-size: 12px; font-weight: 700; padding: 2px 6px; border-radius: 4px; animation: pulse-live 1.5s infinite; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.match-info-area { flex:1; min-width:0; display:flex; align-items:center; cursor: pointer; overflow: hidden; } 
.match-teams { flex: 1; min-width: 0; max-width: 260px; padding: 0 12px; border-right: 1px solid var(--border); }
.team-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; } .team-row:last-child { margin-bottom: 0; }
.team-logo { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
.team-name { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } .team-name.loser { color: var(--text2); }

.match-score-wrap { display: flex; align-items: center; flex-shrink: 0; margin-left: auto; gap: 12px; }
.match-score { width: 55px; flex-shrink: 0; text-align: center; position: relative; }
.score-num { font-size: 16px; font-weight: 800; line-height: 1.8; color: var(--text); } .score-num.loser { color: var(--text3); } .score-num.live-score { color: var(--green); }

.hide-single-btn { background: transparent; border: none; color: var(--text3); font-size: 16px; cursor: pointer; transition: 0.2s; flex-shrink: 0;}
.hide-single-btn:hover { color: var(--text); }
.match-card.hide-this-score .score-num { filter: blur(5px); opacity: 0.6; transition: 0.3s; }
.match-card.hide-this-score .score-num:hover { filter: blur(0); opacity: 1; }
.detail-score-hidden { filter: blur(6px); opacity: 0.5; transition: var(--transition); }
.detail-score-hidden:hover { filter: blur(0); opacity: 1; }
.match-fav { width: 32px; flex-shrink: 0; text-align: center; font-size: 18px; color: var(--text3); cursor: pointer; transition: var(--transition); }
.match-fav:hover, .match-fav.faved { color: var(--yellow); }

.match-odds-wrapper { flex: 1; display: flex; gap: 12px; align-items: center; padding-left: 16px; min-height: 40px; overflow-x: auto; justify-content: flex-start; min-width: 0; }
.match-odds-wrapper.empty { display: none !important; }
.odds-group { display: flex; gap: 2px; background: var(--bg2); padding: 8px 4px 4px; border-radius: 6px; border: 1px solid var(--border); position: relative; margin-top: 6px;}
.odds-group-title { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 800; color: var(--text3); background: var(--surface); padding: 0 6px; border-radius: 4px; white-space: nowrap;}
.odd-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; text-align: center; min-width: 42px; cursor: pointer; transition: 0.2s; user-select: none; }
.odd-btn:hover { border-color: var(--brand); }
.odd-btn.selected { background: var(--brand); border-color: var(--brand); color: #fff;}
.odd-lbl { font-size: 11px; color: var(--text3); font-weight: 700; margin-bottom: 2px; }
.odd-val { font-size: 13px; color: var(--text); font-weight: 800; }

.bet-slip { position: fixed; bottom: 20px; left: 260px; width: 340px; background: var(--surface); border: 1px solid var(--brand); border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 50; display: none; flex-direction: column; overflow: hidden; animation: slideUp 0.3s ease; }
@keyframes slideUp { from{transform:translateY(20px); opacity:0;} to{transform:translateY(0); opacity:1;} }
.bs-header { background: var(--brand-dim); color: var(--brand); padding: 14px 18px; font-size: 15px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--brand); }
.bs-clear { font-size: 13px; color: var(--text3); cursor: pointer; } .bs-clear:hover { color: var(--red); }
.bs-content { max-height: 250px; overflow-y: auto; padding: 12px; }
.bs-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.bs-item:last-child { margin-bottom: 0; }
.bs-match-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.bs-market { font-size: 12px; color: var(--text3); }
.bs-val-box { display: flex; align-items: center; gap: 12px; }
.bs-odd-val { font-size: 16px; font-weight: 800; color: var(--brand); }
.bs-remove { color: var(--red); cursor: pointer; font-size: 16px; opacity: 0.7; } .bs-remove:hover { opacity: 1; }
.bs-footer { background: var(--bg2); padding: 18px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.bs-total-lbl { font-size: 14px; font-weight: 700; color: var(--text2); }
.bs-total-val { font-size: 22px; font-weight: 800; color: var(--green); }

/* DETAIL PANEL */
.detail-panel { width: 420px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; z-index:20;}
.detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text3); gap: 10px; } .detail-empty .de-icon { font-size: 42px; opacity: 0.3; } .detail-empty .de-text { font-size: 15px; }
.detail-header { padding: 24px 20px 16px; text-align: center; border-bottom: 1px solid var(--border); background: var(--bg2); position:relative; }
.btn-close-panel { position: absolute; top: 12px; right: 12px; background: var(--surface2); color: var(--text2); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: 0.2s; z-index: 10; border: 1px solid var(--border); }
.btn-close-panel:hover { background: var(--red-dim); color: var(--red); border-color: var(--red); }
.btn-back-panel { position: absolute; top: 12px; left: 12px; background: var(--surface2); color: var(--text2); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: 0.2s; z-index: 10; border: 1px solid var(--border); }
.btn-back-panel:hover { background: var(--brand-dim); color: var(--brand); border-color: var(--brand); }
.match-info-meta { font-size:12px; color:var(--text3); margin-top:12px; display:flex; justify-content:center; gap:12px; }
.detail-teams { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 8px; padding: 0 5px; }
.detail-team { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; max-width: 95px; overflow: hidden; }
.detail-team img { width: 48px; height: 48px; object-fit: contain; } 
.detail-team .dt-name { font-size: 13px; font-weight: 700; text-align: center; line-height: 1.2; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.detail-score-box { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1.2; } 
.detail-score { font-size: clamp(22px, 6.5vw, 34px); font-weight: 800; letter-spacing: 1px; white-space: nowrap; text-align: center; }
.detail-score.live-ds { color: var(--green); }
.detail-ht { font-size: 12px; color: var(--text3); margin-top: 2px; }
.detail-status { font-size: 13px; font-weight: 600; margin-top: 6px; padding: 2px 10px; border-radius: 4px; }
.detail-status.st-live { background: var(--green-dim); color: var(--green); } .detail-status.st-finished { background: var(--surface2); color: var(--text3); } .detail-status.st-scheduled { background: var(--brand-dim); color: var(--brand); }
.detail-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); padding: 0 12px; }
.detail-tab { padding: 14px 16px; font-size: 14px; font-weight: 600; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: var(--transition); flex:1; text-align:center;}
.detail-tab:hover { color: var(--text2); } .detail-tab.active { color: var(--brand); border-bottom-color: var(--brand); }
.detail-content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

/* İSTATİSTİK BARLARI */
.stat-group-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); text-align: center;} .stat-group-title:first-child { margin-top: 0; }
.stat-row { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px;} 
.stat-labels { display: flex; justify-content: space-between; align-items: center; width: 100%;}
.stat-val { font-size: 16px; font-weight: 800; color: var(--text); min-width: 24px; } 
.stat-val.home { text-align: left; } .stat-val.away { text-align: right; } .stat-val.high { color: var(--brand); }
.stat-name { font-size: 13px; font-weight: 600; color: var(--text2); text-align: center; flex: 1; }
.stat-bar-track { display: flex; height: 6px; border-radius: 3px; overflow: hidden; background: var(--surface2); gap: 2px; }
.stat-bar-home { height:100%; border-radius:3px; background:var(--brand); transition:width 0.6s ease; } .stat-bar-away { height:100%; border-radius:3px; background:var(--orange); transition:width 0.6s ease; margin-left:auto; }

/* 🚀 SAHA GÖRÜNÜMÜ GÜNCELLEMESİ (Zorunlu Kodlar) 🚀 */
/* Genel Saha Konteyneri (min-height eklendi, daralma sorunu çözüldü) */
.pitch-container { position: relative; width: 100%; margin-bottom: 16px; min-height: 250px; }

/* Gerçek Saha Görseli (Buraya taşındı) */
.pitch-visual { 
  width: 100%; 
  background-size: cover; background-position: center center; background-repeat: no-repeat; 
  border-radius: 8px; border: 2px solid transparent; 
  display: flex; flex-direction: column; justify-content: space-between; gap: 10px;
}

/* 🚀 Futbol Sahası Görseli 🚀 */
.pitch-visual.football { 
  background-color: #2a3c24;

/* Saha satırları (Futbolda 4, basketbolda pozisyona göre değişir) */
.pitch-row { display: flex; justify-content: center; gap: 12px; }

/* 🚀 Basketbol Saha Düzeni Ayarları 🚀 */
.pitch-visual.basketball .pitch-row:nth-child(1) { order: 1; margin-bottom: 25px; } /* C - Pivot (En üst, pota altı) */
.pitch-visual.basketball .pitch-row:nth-child(2) { order: 2; margin-bottom: 25px; } /* F - Forvetler */
.pitch-visual.basketball .pitch-row:nth-child(3) { order: 3; } /* G - Guardlar (En alt, oyun kurucu) */

.pitch-player { display: flex; flex-direction: column; align-items: center; width: 60px; cursor: pointer; transition: transform 0.2s; }
.pitch-player:hover { transform: scale(1.1); }
.p-img-wrap { position: relative; }
.pitch-player img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #fff; background: var(--surface); object-fit: cover; }
.p-num { position: absolute; bottom: 0; left: -6px; background: rgba(0,0,0,0.8); color: #fff; font-size: 11px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
.pitch-player .p-rating { color: #000; font-size: 12px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-top: -6px; z-index: 2; border: 1px solid #fff; }
.pitch-player .p-name { font-size: 12px; color: #fff; font-weight: 700; margin-top: 4px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; text-shadow: 1px 1px 2px #000; }
.rating-high { background:var(--green) !important; color:#000 !important; } .rating-mid { background:var(--yellow) !important; color:#000 !important; } .rating-low { background:var(--text3) !important; color:#fff !important; }

.lineup-section-title { font-size:14px; font-weight:800; color:var(--text); margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.lineup-list { display: flex; flex-direction: column; gap: 4px; }
.ll-item { display: flex; align-items: center; background: var(--bg2); padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: var(--transition); border: 1px solid transparent;}
.ll-item:hover { border-color: var(--border2); background: var(--surface2); }
.ll-num { width: 32px; height: 32px; background: var(--surface); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: var(--text2); flex-shrink: 0; margin-right: 12px;}
.ll-info { flex: 1; min-width: 0; }
.ll-name { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ll-pos { font-size: 12px; color: var(--text3); margin-top: 2px; }
.ll-rating { font-size: 13px; font-weight: 800; padding: 4px 10px; border-radius: 6px; flex-shrink: 0; }
.ll-fav { color: var(--text3); font-size: 20px; margin-left: 12px; transition: 0.2s; }
.ll-fav:hover, .ll-fav.faved { color: var(--yellow); }

/* OYUNCU MODAL */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
.player-modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 420px; max-height: 80vh; padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); position: relative; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column;}
@keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.pm-close { position: absolute; top: 12px; right: 12px; font-size: 18px; color: var(--text3); cursor: pointer; transition: 0.2s; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 50;}
.pm-close:hover { background: var(--surface2); color: var(--text); }
.pm-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); flex-shrink:0;}
.pm-header img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; background: var(--bg2); border: 2px solid var(--border); }
.pm-name { font-size: 20px; font-weight: 800; color: var(--text); }
.pm-pos { font-size: 14px; color: var(--text2); margin-top: 4px; }
.pm-rating { margin-top: 6px; display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 14px; font-weight: 800; }
.pm-body { overflow-y: auto; padding-right: 5px; }
.pm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pm-stat-box { background: var(--bg2); padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;}
.pm-stat-lbl { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; text-align: center;}
.pm-stat-val { font-size: 18px; font-weight: 800; color: var(--brand); }

/* INCIDENTS */
.incident-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
.incident-row { display: flex; align-items: center; background: var(--surface2); padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
.incident-time { font-weight: 800; font-size: 15px; width: 44px; color: var(--text2); flex-shrink: 0; }
.incident-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; margin-right: 14px; flex-shrink: 0; background: var(--surface); border-radius: 50%; border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.incident-details { flex: 1; min-width: 0; }
.incident-player { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height:1.4;}
.incident-desc { font-size: 13px; color: var(--text3); margin-top: 2px; }
.incident-score { font-size: 16px; font-weight: 800; background: var(--bg); padding: 4px 10px; border-radius: 6px; color: var(--brand); margin-left: 12px; flex-shrink: 0; border: 1px solid var(--border); }

/* FAVORITE PLAYERS GRID */
.fav-players-grid { display:flex; flex-wrap:wrap; gap:10px; padding:0 14px; }

/* UTILITY */
/* SEARCH BAR */
.search-container { position: relative; flex: 1; max-width: 380px; min-width: 180px; }
.search-input-wrap { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 12px; height: 38px; transition: var(--transition); gap: 8px; }
.search-input-wrap:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-dim); }
.search-input-wrap svg { flex-shrink: 0; color: var(--text3); transition: var(--transition); }
.search-input-wrap:focus-within svg { color: var(--brand); }
.search-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 14px; font-weight: 500; min-width: 0; }
.search-input::placeholder { color: var(--text3); }
.search-clear { display: none; background: none; border: none; color: var(--text3); font-size: 16px; cursor: pointer; padding: 2px; line-height: 1; transition: 0.2s; }
.search-clear:hover { color: var(--text); }
.search-input-wrap.has-value .search-clear { display: block; }
.search-shortcut { font-size: 11px; font-weight: 700; color: var(--text3); background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; flex-shrink: 0; pointer-events: none; }
.search-input-wrap:focus-within .search-shortcut { display: none; }

.search-dropdown { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 12px 36px rgba(0,0,0,0.4); z-index: 200; display: none; max-height: 420px; overflow-y: auto; animation: searchFadeIn 0.2s ease; }
.search-dropdown.active { display: block; }
@keyframes searchFadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.search-section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); padding: 12px 14px 6px; }
.search-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; cursor: pointer; transition: var(--transition); border-bottom: 1px solid var(--border); }
.search-item:last-child { border-bottom: none; }
.search-item:hover, .search-item.focused { background: var(--brand-dim); }
.search-item img { width: 32px; height: 32px; border-radius: 50%; object-fit: contain; background: var(--bg2); flex-shrink: 0; border: 1px solid var(--border); }
.search-item-info { flex: 1; min-width: 0; }
.search-item-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.search-item-name mark { background: var(--brand-dim); color: var(--brand); border-radius: 2px; padding: 0 2px; }
.search-item-sub { font-size: 12px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.search-item-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
.search-item-badge.team { background: var(--brand-dim); color: var(--brand); }
.search-item-badge.player { background: var(--green-dim); color: var(--green); }
.search-no-result { padding: 30px 20px; text-align: center; color: var(--text3); font-size: 14px; }
.search-no-result .snr-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }
.search-loading { display: flex; align-items: center; justify-content: center; padding: 24px; gap: 10px; color: var(--text3); font-size: 13px; }
.search-loading .spinner { width: 18px; height: 18px; }

@media (max-width: 768px) {
  .search-container { order: 7; min-width: 100%; margin-top: 4px; }
  .search-dropdown { max-height: 320px; }
  .search-shortcut { display: none; }
}
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 0; gap:12px; }
.spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--brand); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty-state { text-align:center; padding:60px 20px; color:var(--text3); } .empty-state .es-icon { font-size:38px; margin-bottom:12px; opacity:0.4; } .empty-state .es-text { font-size:15px; line-height:1.6; }

          <line x1="4" y1="3" x2="4" y2="21" stroke="var(--text2)" stroke-width="2" stroke-linecap="round"/>

  <main class="main">

          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;">
            <line x1="4" y1="3" x2="4" y2="21" stroke="var(--text2)" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 4L19 4C19 4 21 4 21 6C21 8 19 8 19 8L4 8" fill="var(--brand)" stroke="var(--brand)" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M4 8L16 8C16 8 18 8 18 10C18 12 16 12 16 12L4 12" fill="#fff" fill-opacity="0.9" stroke="var(--brand)" stroke-width="0.8" stroke-linejoin="round"/>
            <circle cx="4" cy="3" r="1.5" fill="var(--brand)"/>

          <span class="v" style="font-size:22px;">Vivo</span><span class="s" style="font-size:22px;">Score</span>

      <div class="tb-row tb-search-row">

            <input type="text" class="search-input" id="searchInput" placeholder="Takım veya oyuncu ara..." autocomplete="off">
            <button class="search-clear" id="searchClear" onclick="Search.clear()">✕</button>

      <div class="tb-row tb-actions-row">

        </button>
        <button class="btn-toggle fav-toggle" id="favToggleBtn" onclick="V.toggleFavView()">
          ⭐ <span class="hide-mobile">Favoriler</span>
        </button>
        <button class="btn-toggle odds-toggle active" id="oddsToggleBtn" onclick="V.toggleOddsVisibility()">
          📊 <span class="hide-mobile">Oranlar</span>

<div class="modal-overlay" id="playerModalOverlay" onclick="V.closePlayerModal(event)">

    <div class="auth-error" id="authError"></div>
    <button class="social-btn" onclick="Auth.socialLogin('google')">Google ile Devam Et</button>
    <button class="social-btn" onclick="Auth.socialLogin('github')">GitHub ile Devam Et</button>
    <div style="font-size:11px; color:var(--text3); margin-top:20px;">Giriş yaparak Kullanım Şartları ve Gizlilik Politikamızı kabul etmiş sayılırsınız.</div>
  </div>
</div>

<script>
// SUPABASE, AUTH VE GÜVENLİK KODLARI (Aynı kaldı)
function esc(str) {
  if (str === null || str === undefined) return '';
  var s = String(str);
  var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '/': '&#x2F;' };
  return s.replace(/[&<>"'\/\\]/g, function(c) { return map[c] || c; });
}
function safeNum(val) { var n = Number(val); return isNaN(n) ? 0 : n; }
function safeImgUrl(url) {
  if (typeof url !== 'string') return '';
  if (url.startsWith('https://api.sofascore.app/') || url.startsWith('http')) return url;
  return '';
}
var safeStorage = {
  get: function(key, fallback) {
    try { var v = window.localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch(e) { return fallback; }
  },
  set: function(key, val) {
    try { window.localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  }
};

var SPORTS = [
  { id: 'football', name: 'Futbol', icon: '⚽' },
  { id: 'basketball', name: 'Basketbol', icon: '🏀' },
  { id: 'mma', name: 'UFC / MMA', icon: '🥊' },
  { id: 'tennis', name: 'Tenis', icon: '🎾' }
];

var STAT_DICT = {
  goals: 'Gol', assists: 'Asist', totalShots: 'Toplam Şut', shotsOnTarget: 'İsabetli Şut', AccuratePasses: 'İsabetli Pas', totalTackle: 'Müdahale', possessionLostCtrl: 'Top Kaybı', fouls: 'Faul Yaptı', rating: 'SofaScore Reyting',
  points: 'Sayı', rebounds: 'Ribaund', steals: 'Top Çalma', blocks: 'Blok'
};

var V = {
  state: {
    page: 'matches', selectedSport: 'football', dateOffset: 0, isLiveOnly: false,
    selectedMatch: null, detailTab: 'summary', matchCache: {},
    playerData: {}, favs: safeStorage.get('vivo_favs', []),
    favPlayers: safeStorage.get('vivo_fav_players', []),
    hideScores: safeStorage.get('vivo_hide_scores', false),
    hiddenMatchScores: safeStorage.get('vivo_hidden_matches', {}),
    theme: safeStorage.get('vivo_theme', 'dark'),
    showOdds: safeStorage.get('vivo_show_odds', true),
    betSlip: []
  },
  init: function() { 
    this.renderSports(); this.renderDateNav(); this.loadMatches(); 
    if(this.state.hideScores) document.body.classList.add('hide-scores');
    this.updateHideScoresBtn();
    document.documentElement.setAttribute('data-theme', this.state.theme);
    if(!this.state.showOdds) document.body.classList.add('hide-odds');
    this.updateOddsBtn();
    
    var sObj = SPORTS.find(function(x){ return x.id === V.state.selectedSport; });
    var ic = sObj ? sObj.icon : '⚽';
    document.getElementById('detailPanel').innerHTML = '<div class="detail-empty"><div class="de-icon">' + ic + '</div><div class="de-text">Detayları görmek için bir maça tıklayın</div></div>';
    
    Auth.init();
  },
  toggleHideScores: function() {
    this.state.hideScores = !this.state.hideScores;
    safeStorage.set('vivo_hide_scores', this.state.hideScores);
    document.body.classList.toggle('hide-scores', this.state.hideScores);
    this.updateHideScoresBtn();
    Auth.saveCloudData();
  },
  updateHideScoresBtn: function() {
    var btn = document.getElementById('hideScoresBtn');
    if(btn) {
      btn.classList.toggle('active', this.state.hideScores);
      btn.innerHTML = this.state.hideScores ? '👁️ <span class="hide-mobile">Göster</span>' : '🙈 <span class="hide-mobile">Gizle</span>';
    }
  },
  toggleTheme: function() {
    this.state.theme = this.state.theme === 'dark' ? 'light' : 'dark';
    safeStorage.set('vivo_theme', this.state.theme);
    document.documentElement.setAttribute('data-theme', this.state.theme);
    Auth.saveCloudData();
  },
  toggleOddsVisibility: function() {
    this.state.showOdds = !this.state.showOdds;
    safeStorage.set('vivo_show_odds', this.state.showOdds);
    document.body.classList.toggle('hide-odds', !this.state.showOdds);
    this.updateOddsBtn();
    Auth.saveCloudData();
  },
  updateOddsBtn: function() {
    var btn = document.getElementById('oddsToggleBtn');
    if(btn) btn.classList.toggle('active', this.state.showOdds);
  },
  toggleSingleScore: function(matchId, ev) {
    if (ev) ev.stopPropagation();
    if(this.state.hiddenMatchScores[matchId]) delete this.state.hiddenMatchScores[matchId];
    else this.state.hiddenMatchScores[matchId] = true;
    safeStorage.set('vivo_hidden_matches', this.state.hiddenMatchScores);
    
    var mCard = document.querySelector('.match-card[data-match="'+matchId+'"]');
    if(mCard) {
      mCard.classList.toggle('hide-this-score', !!this.state.hiddenMatchScores[matchId]);
      var iconBtn = mCard.querySelector('.hide-single-btn');
      if(iconBtn) iconBtn.innerHTML = this.state.hiddenMatchScores[matchId] ? '👁️' : '🙈';
    }
  },
  toggleLive: function() {
    this.state.isLiveOnly = !this.state.isLiveOnly;
    var btn = document.getElementById('liveToggleBtn');
    if(btn) btn.classList.toggle('active', this.state.isLiveOnly);
    var dateNav = document.getElementById('dateNav');
    if(dateNav) {
        if(this.state.isLiveOnly) dateNav.classList.add('disabled');
        else dateNav.classList.remove('disabled');
    }
    if(this.state.page === 'matches') this.loadMatches();
  },
  toggleFavView: function() {
    if(this.state.page === 'favorites') {
      this.state.page = 'matches'; document.getElementById('favToggleBtn').classList.remove('active'); this.loadMatches();
    } else {
      this.state.page = 'favorites'; document.getElementById('favToggleBtn').classList.add('active'); this.loadFavorites();
    }
  },
  toggleLeague: function(lgId) {
    var g = document.getElementById(lgId);
    if(g) g.classList.toggle('collapsed');
  },
  getDateStr: function(offset) {
    var d = new Date();
    d.setDate(d.getDate() + (offset || 0) + this.state.dateOffset);
    return d.toISOString().split('T')[0];
  },
  getDateLabel: function(offset) {
    var d = new Date(); var total = (offset || 0) + this.state.dateOffset; d.setDate(d.getDate() + total);
    var days = ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt']; var months = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
    var sub = d.getDate() + ' ' + months[d.getMonth()];
    if (total === 0) return { main: 'Bugün', sub: sub }; if (total === -1) return { main: 'Dün', sub: sub }; if (total === 1) return { main: 'Yarın', sub: sub };
    return { main: d.getDate() + ' ' + months[d.getMonth()], sub: days[d.getDay()] };
  },
  renderDateNav: function() {
    var nav = document.getElementById('dateNav'); if (!nav) return;
    var parts = [];
    for (var i = -2; i <= 2; i++) {
      var l = this.getDateLabel(i);
      parts.push('<button class="date-btn' + (i===0?' active':'') + '" onclick="V.goToDate(' + i + ')">' + l.main + '<span class="day">' + l.sub + '</span></button>');
    }
    nav.innerHTML = parts.join('');
  },
  goToDate: function(rel) {
    this.state.dateOffset += rel;
    this.renderDateNav();
    if (this.state.isLiveOnly) { this.state.isLiveOnly = false; var lb = document.getElementById('liveToggleBtn'); if(lb) lb.classList.remove('active'); var dn = document.getElementById('dateNav'); if(dn) dn.classList.remove('disabled'); }
    if (this.state.page === 'favorites') { this.state.page = 'matches'; var fb = document.getElementById('favToggleBtn'); if(fb) fb.classList.remove('active'); }
    this.loadMatches();
  },
  shiftDate: function(dir) {
    this.state.dateOffset += dir;
    this.renderDateNav();
    if (this.state.isLiveOnly) { this.state.isLiveOnly = false; var lb = document.getElementById('liveToggleBtn'); if(lb) lb.classList.remove('active'); var dn = document.getElementById('dateNav'); if(dn) dn.classList.remove('disabled'); }
    if (this.state.page === 'favorites') { this.state.page = 'matches'; var fb = document.getElementById('favToggleBtn'); if(fb) fb.classList.remove('active'); }
    this.loadMatches();
  },
  renderSports: function() {
    var el = document.getElementById('sportList'); if (!el) return;
    var html = '';
    for(var i=0; i<SPORTS.length; i++) {
      var s = SPORTS[i];
      var activeCls = (s.id === this.state.selectedSport) ? ' active' : '';
      html += '<div class="sport-item'+activeCls+'" onclick="V.selectSport(\''+s.id+'\')"><span class="flag">'+s.icon+'</span><span>'+s.name+'</span></div>';
    }
    el.innerHTML = html;
  },
  selectSport: function(id) {
    this.state.selectedSport = id; this.renderSports();
    this.state.page = 'matches';
    document.getElementById('favToggleBtn').classList.remove('active');
    
    var sObj = SPORTS.find(function(x){ return x.id === id; });
    var ic = sObj ? sObj.icon : '⚽';
    document.getElementById('detailPanel').innerHTML = '<div class="detail-empty"><div class="de-icon">' + ic + '</div><div class="de-text">Detayları görmek için bir maça tıklayın</div></div>';
    
    this.loadMatches();
  },
  goToToday: function() {
    this.state.dateOffset = 0;
    this.state.isLiveOnly = false;
    this.state.page = 'matches';
    document.getElementById('liveToggleBtn').classList.remove('active');
    document.getElementById('favToggleBtn').classList.remove('active');
    document.getElementById('dateNav').classList.remove('disabled');
    this.renderDateNav();
    this.loadMatches();
  },
  apiFetch: function(url) {
    return fetch(url).then(function(r) {
      if (!r.ok) {
        return r.text().then(function(body) {
          var msg = 'API ' + r.status;
          try { var j = JSON.parse(body); if(j.error) msg = j.error; } catch(e) {}
          throw new Error(msg);
        });
      }
      return r.json();
    });
  },
  loadMatches: function() {
    var el = document.getElementById('matchScroll'); if (!el) return;
    var dateStr = this.getDateStr();
    var endpoint = this.state.isLiveOnly ? '/api/live/' + this.state.selectedSport : '/api/schedule/' + this.state.selectedSport + '/' + dateStr;
    el.innerHTML = T.loading(this.state.isLiveOnly ? 'Canlı maçlar aranıyor...' : dateStr + ' tarihli maçlar yükleniyor...');
    this.apiFetch(endpoint).then(function(data) {
      if (!data.groups || Object.keys(data.groups).length === 0) el.innerHTML = T.empty(V.state.isLiveOnly ? 'Şu anda canlı maç bulunmuyor.' : '<b>' + dateStr + '</b> tarihinde maç bulunamadı.');
      else {
        var html = ''; var gKeys = Object.keys(data.groups);
        for (var i = 0; i < gKeys.length; i++) html += T.leagueGroup(data.groups[gKeys[i]].name, gKeys[i], data.groups[gKeys[i]].matches);
        el.innerHTML = html;
      }
    }).catch(function(err) {
      el.innerHTML = T.empty('Veri yüklenirken hata oluştu.<br><span style="font-size:12px;opacity:0.6;">' + dateStr + ' | ' + (err.message || 'Bağlantı hatası') + '</span>');
    });
  },
  loadFavorites: function() {
    var el = document.getElementById('matchScroll'); if (!el) return;
    if (this.state.favs.length === 0 && this.state.favPlayers.length === 0) return el.innerHTML = T.empty('Henüz favori maç veya oyuncu eklemediniz.');
    el.innerHTML = T.loading('Favorileriniz yükleniyor...');
    var playersHtml = '';
    if(this.state.favPlayers.length > 0) {
      playersHtml = '<div class="league-group"><div class="league-header">⭐ Favori Oyuncular</div><div class="fav-players-grid">';
      for(var i=0; i<this.state.favPlayers.length; i++) {
        var fp = this.state.favPlayers[i];
        V.state.playerData[fp.id] = fp;
        var rHtml = fp.rating ? '<span class="pm-rating rating-mid" style="font-size:11px; margin-top:0; padding:2px 6px;">' + fp.rating + '</span>' : '';
        playersHtml += '<div class="pitch-player" style="position:relative; width:auto; flex-direction:row; background:var(--surface); padding:8px 12px; border-radius:var(--radius-sm); border:1px solid var(--border); gap:10px; cursor:pointer;" onclick="V.showPlayerModal(\''+fp.id+'\')">' +
          '<img src="'+safeImgUrl(fp.img)+'" onerror="this.src=\'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=\'" style="width:34px; height:34px;">' +
          '<div><div class="p-name" style="text-align:left; max-width:140px; color:var(--text); font-weight:700;">'+esc(fp.name)+'</div>' +
          '<div style="font-size:11px; color:var(--text2); margin-top:1px;">'+esc(fp.pos)+' '+rHtml+'</div></div>' +
          '<div style="color:var(--yellow); cursor:pointer; font-size:16px; margin-left:auto;" onclick="V.toggleFavPlayer(\''+fp.id+'\', event)">★</div>' +
          '</div>';
      }
      playersHtml += '</div></div>';
    }
    if(this.state.favs.length === 0) { el.innerHTML = playersHtml; return; }
    var promises = this.state.favs.map(function(id) { return V.apiFetch('/api/event/' + id).catch(function(){ return null; }); });
    Promise.all(promises).then(function(results) {
      var validMatches = [];
      for(var i=0; i<results.length; i++) { if(results[i] && results[i].event) validMatches.push(results[i].event); }
      var matchesHtml = '';
      if(validMatches.length > 0) {
        validMatches.sort(function(a,b){ return a.timestamp - b.timestamp; });
        matchesHtml = T.leagueGroup('Yıldızladığım Maçlar', 'fav', validMatches);
      }
      el.innerHTML = playersHtml + matchesHtml;
    });
  },
  toggleFav: function(matchId, ev) {
    if (ev) ev.stopPropagation();
    var idx = this.state.favs.indexOf(matchId);
    if (idx >= 0) { this.state.favs.splice(idx, 1); if(this.state.page === 'favorites') this.loadFavorites(); }
    else { this.state.favs.push(matchId); }
    safeStorage.set('vivo_favs', this.state.favs);
    document.querySelectorAll('.match-fav[data-fav="' + matchId + '"]').forEach(function(star){ star.classList.toggle('faved'); });
    Auth.saveCloudData();
  },
  toggleFavPlayer: function(playerId, ev) {
    if (ev) ev.stopPropagation();
    var p = V.state.playerData[playerId]; if(!p) return;
    var idx = this.state.favPlayers.findIndex(function(fp){ return fp.id === p.id; });
    if (idx >= 0) this.state.favPlayers.splice(idx, 1); else this.state.favPlayers.push(p);
    safeStorage.set('vivo_fav_players', this.state.favPlayers);
    Auth.saveCloudData();
    document.querySelectorAll('.ll-fav[data-pid="' + p.id + '"]').forEach(function(star){ star.classList.toggle('faved'); });
    if(this.state.page === 'favorites') this.loadFavorites();
  },
  _currentModalPlayerId: null,
  toggleFavFromModal: function() {
    V.toggleFavPlayer(this._currentModalPlayerId);
    var isFav = this.state.favPlayers.some(function(fp){ return fp.id === V._currentModalPlayerId; });
    var btn = document.getElementById('pmFavBtn');
    if(btn) btn.innerHTML = isFav ? '★ Favorilerden Çıkar' : '⭐ Favorilere Ekle';
  },
  showDetail: function(matchId) {
    this.state.selectedMatch = matchId; this.detailTab = 'summary';
    document.querySelectorAll('.match-card').forEach(function(el) { el.classList.remove('selected'); });
    var card = document.querySelector('.match-card[data-match="' + matchId + '"]'); if (card) card.classList.add('selected');
    var panel = document.getElementById('detailPanel'); panel.classList.add('open'); 
    panel.innerHTML = T.loading('Maç detayları yükleniyor...');
    var self = this;
    this.apiFetch('/api/event/' + matchId).then(function(data) {
      self.state.matchCache[matchId] = { match: data.event }; self.renderDetail(matchId);
    }).catch(function() { panel.innerHTML = T.empty('Maç detayları yüklenemedi'); });
  },
  closeDetail: function() {
    document.querySelectorAll('.match-card').forEach(function(el) { el.classList.remove('selected'); });
    var panel = document.getElementById('detailPanel');
    if(panel) {
        panel.classList.remove('open');
        setTimeout(function() {
            var sObj = SPORTS.find(function(x){ return x.id === V.state.selectedSport; });
            var ic = sObj ? sObj.icon : '⚽';
            panel.innerHTML = '<div class="detail-empty"><div class="de-icon">' + ic + '</div><div class="de-text">Detayları görmek için bir maça tıklayın</div></div>';
        }, 300);
    }
  },
  renderDetail: function(matchId) {
    var cache = this.state.matchCache[matchId]; if (!cache) return;
    var m = cache.match; var panel = document.getElementById('detailPanel'); if (!panel) return;

    var isLive = m.status === 'live'; var isFinished = m.status === 'finished'; var hasScore = m.homeScore !== null && m.homeScore !== undefined;
    var statusHtml = '';
    
    var displayMinute = m.minute || 'CANLI';
    if (typeof displayMinute === 'string') {
        displayMinute = displayMinute.replace('Awaiting announcement', 'Bekleniyor')

    panel.innerHTML = h; this.loadTab('summary', matchId);
  },
  loadTab: function(tab, matchId) {
    this.state.detailTab = tab; document.querySelectorAll('.detail-tab').forEach(function(el) { el.classList.toggle('active', el.getAttribute('data-tab') === tab); });
    var content = document.getElementById('detailContent'); if (!content) return;

    if (tab === 'summary') {
      this.apiFetch('/api/event/' + matchId + '/incidents').then(function(data) {
        content.innerHTML = (data.incidents && data.incidents.length > 0) ? T.incidents(data.incidents) : T.empty('Bu maç için detaylı olay özeti bulunmuyor.');

      this.apiFetch('/api/event/' + matchId + '/stats').then(function(data) {

    } else if (tab === 'lineups') {
      this.apiFetch('/api/event/' + matchId + '/lineups').then(function(data) { content.innerHTML = T.lineups(data); }).catch(function() { content.innerHTML = T.empty('Kadro bilgisi henüz açıklanmadı'); });

    for(var i=0; i<keys.length; i++){ if(added>=6) break; var k = keys[i]; var v = s[k]; if(k==='rating') continue; var label = STAT_DICT[k] || k.charAt(0).toUpperCase()+k.slice(1); html += '<div class="pm-stat-box"><div class="pm-stat-lbl">'+label+'</div><div class="pm-stat-val">'+v+'</div></div>'; added++; }

};

var T = {
  loading: function(text) { return '<div class="loading"><div class="spinner"></div><div class="loading-text">' + text + '</div></div>'; },

  matchCard: function(m) {

    var hideBtnHtml = isEligibleForHide ? '<button class="hide-single-btn" title="Skoru Gizle" onclick="V.toggleSingleScore(' + safeId + ', event)">' + (isHidden ? '👁️' : '🙈') + '</button>' : '';

    return '<div class="match-card' + (isLive ? ' live-card' : '') + (isHidden ? ' hide-this-score' : '') + '" data-match="' + safeId + '">' + timeH +
      '<div class="match-info-area" onclick="V.showDetail(' + safeId + ')">' +
        '<div class="match-teams"><div class="team-row"><img class="team-logo" src="' + safeImgUrl(m.homeTeam.img) + '" onerror="this.style.visibility=\'hidden\'"><span class="team-name' + (aW ? ' loser' : '') + '">' + esc(m.homeTeam.shortName) + '</span></div>' +
        '<div class="team-row"><img class="team-logo" src="' + safeImgUrl(m.awayTeam.img) + '" onerror="this.style.visibility=\'hidden\'"><span class="team-name' + (hW ? ' loser' : '') + '">' + esc(m.awayTeam.shortName) + '</span></div></div>' +
        oddsH + '<div class="match-score-wrap">' + scoreH + hideBtnHtml + '</div>' +
      '</div><div class="match-fav' + (isFav ? ' faved' : '') + '" data-fav="' + safeId + '" onclick="V.toggleFav(' + safeId + ',event)">\u2605</div></div>';
  },
  leagueGroup: function(name, id, matches) {
    var cards = ''; for (var i = 0; i < matches.length; i++) cards += this.matchCard(matches[i]);
    var safeId = esc(String(id));
    var imgHtml = id === 'fav' ? '⭐' : '<img src="https://api.sofascore.app/api/v1/unique-tournament/' + safeId + '/image" onerror="this.style.display=\'none\'">';

    return '<div class="league-group collapsed" id="lg-' + safeId + '"><div class="league-header" onclick="V.toggleLeague(\'lg-' + safeId + '\')">' + imgHtml + '<span>' + esc(name) + '</span>' + chevron + '</div><div class="league-matches">' + cards + '</div></div>';
  },
  statBar: function(s) {
    var hVal = parseFloat(String(s.home).replace('%','')) || 0; var aVal = parseFloat(String(s.away).replace('%','')) || 0;
    var tot = hVal + aVal || 1; var hP = (hVal / tot) * 100; var aP = (aVal / tot) * 100;
    return '<div class="stat-row"><div class="stat-labels"><span class="stat-val home' + (hVal > aVal ? ' high' : '') + '">' + esc(s.home) + '</span><span class="stat-name">' + esc(s.name) + '</span><span class="stat-val away' + (aVal > hVal ? ' high' : '') + '">' + esc(s.away) + '</span></div><div class="stat-bar-track"><div class="stat-bar-home" style="width:' + hP + '%"></div><div class="stat-bar-away" style="width:' + aP + '%"></div></div></div>';
  },
  statsDetailed: function(rawStats) {
    if (!rawStats || rawStats.length === 0) return this.empty('Detaylı istatistik mevcut değil');
    var html = '';
    for (var i = 0; i < rawStats.length; i++) {
      if (rawStats[i].period !== 'ALL') continue;
      var groups = rawStats[i].groups || [];
      for (var g = 0; g < groups.length; g++) {
        html += '<div class="stat-group-title">' + groups[g].groupName + '</div>';
        var items = groups[g].statisticsItems || [];
        for (var s = 0; s < items.length; s++) html += this.statBar({ name: items[s].name, home: items[s].homeValue, away: items[s].awayValue });
      }
    }
    return html;
  },
  lineups: function(data) {
    if (!data) return this.empty('Kadro bilgisi henüz açıklanmadı');
    var hObj = data.home || {}; var aObj = data.away || {};
    var hp = hObj.players || []; var ap = aObj.players || [];
    var hm = hObj.missing || []; var am = aObj.missing || [];
    
    if(hp.length===0 && ap.length===0) return this.empty('İlk 11\'ler henüz belirlenmedi.');
    
    /* 🚀 SAHA GÖRÜNÜMÜ GÜNCELLEMESİ (JS Tarafı) 🚀 */
    // Spor dalına göre saha class'ını ve düzenleme mantığını belirle
    var pitchClass = (V.state.selectedSport === 'basketball') ? 'basketball' : 'football';
    
    // Futbol ve Basketbol için farklı starter başlıkları
    var starterLabel = 'İlk 11';
    if(V.state.selectedSport === 'basketball') starterLabel = 'İlk 5';
    else if(V.state.selectedSport === 'volleyball') starterLabel = 'İlk 6';
    
    var html = '<div style="font-size:12px; color:var(--text3); text-align:center; margin-bottom:10px;">Detaylı istatistik için oyuncuya tıklayın</div>';
    
    var isScoreHidden = !!V.state.hiddenMatchScores[V.state.selectedMatch];
    var blurClass = isScoreHidden ? ' detail-score-hidden' : '';

    var format = (V.state.selectedSport === 'basketball') ? '{ "G":[], "F":[], "C":[] }' : '{ "G":[], "D":[], "M":[], "F":[] }';

    var renderPitch = function(players, formationRaw) {
        var starters = players.filter(function(p){ return !p.substitute; });
        var groups = JSON.parse(format);
        var unknown = [];
        
        starters.forEach(function(p) {
            var pPosRaw = p.position || (p.player && p.player.position) || '';
            // Basketbolda PG, SG, SF, PF, C gibi dikey pozisyonlar gelir, G/F/C olarak kümeliyoruz
            if(pPosRaw === 'G' || pPosRaw === 'PG' || pPosRaw === 'SG') groups.G.push(p); 
            else if(pPosRaw === 'F' || pPosRaw === 'SF' || pPosRaw === 'PF') groups.F.push(p);
            else if(pPosRaw === 'C') groups.C.push(p); 
            // Futbol pozisyonları
            else if(pPosRaw === 'D') groups.D.push(p);
            else if(pPosRaw === 'M') groups.M.push(p);
            else unknown.push(p);
        });
        
        // Futbolda ortasahaya, basketbolda forvete bilinmeyenleri ekleyelim
        if(V.state.selectedSport === 'basketball') groups.F = groups.F.concat(unknown); 
        else if (groups.M) groups.M = groups.M.concat(unknown); 
        
        // Saha dizilimi için satır sırasını belirle
        var lines = (V.state.selectedSport === 'basketball') ? [groups.G, groups.F, groups.C] : [groups.G, groups.D, groups.M, groups.F];
        
        var pitchHtml = '<div class="pitch-container ' + blurClass + '"><div class="pitch-visual '+pitchClass+'">';
        
        // Dizilim başlığı
        if(V.state.selectedSport === 'football' && formationRaw) {
            pitchHtml += '<div style="position:absolute; top:8px; left:50%; transform:translateX(-50%); text-align:center; font-size:14px; font-weight:700; color:var(--brand); text-shadow:1px 1px 2px #000;">' + formationRaw + '</div>';
        }

        lines.forEach(function(line) {
            if(line.length === 0) return;
            pitchHtml += '<div class="pitch-row">';
            line.forEach(function(p) {
                var pId = p.id || (p.player && p.player.id) || '';
                var pName = p.player ? (p.player.shortName || p.player.name) : (p.playerName || '');
                var pImg = p.player && p.player.id ? 'https://api.sofascore.app/api/v1/player/' + p.player.id + '/image' : '';
                var pStats = p.statistics || {};
                var pRating = pStats.rating || '';
                var pPosRaw = p.position || (p.player && p.player.position) || '';
                
                // Basketbol pozisyon eşlemesi (Guard, Forvet, Pivot)
                var posMap = (V.state.selectedSport === 'basketball') ? { G:'Guard', F:'Forvet', C:'Pivot', PG:'PG', SG:'SG', SF:'SF', PF:'PF' } : { G:'Kaleci', D:'Defans', M:'Ortasaha', F:'Forvet' };
                var finalPos = posMap[pPosRaw] || pPosRaw || '';
                
                V.state.playerData[pId] = { id: pId, name: pName, pos: finalPos, img: pImg, rating: pRating, stats: pStats };

                var rc = ''; if (pRating) { var r = parseFloat(pRating); rc = r >= 7.5 ? 'rating-high' : (r >= 6.5 ? 'rating-mid' : 'rating-low'); }
                pitchHtml += '<div class="pitch-player" onclick="V.showPlayerModal(\'' + pId + '\')">' +
                             '<div class="p-img-wrap"><img src="'+safeImgUrl(pImg)+'" onerror="this.src=\'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=\'"></div>' +
                             (pRating ? '<div class="p-rating '+rc+'">'+pRating+'</div>' : '') + '<div class="p-name">'+esc(pName)+'</div></div>';
            });
            pitchHtml += '</div>';
        });
        return pitchHtml + '</div></div>';
    };

    var renderList = function(players, title) {
        if(!players || players.length === 0) return '';
        var lHtml = '<div class="lineup-section-title">' + title + '</div><div class="lineup-list">';
        players.forEach(function(p) {
            var pId = p.id || (p.player && p.player.id) || '';
            var pName = p.player ? (p.player.shortName || p.player.name) : (p.playerName || '');
            var pImg = p.player && p.player.id ? 'https://api.sofascore.app/api/v1/player/' + p.player.id + '/image' : '';
            var pStats = p.statistics || {};
            var pRating = pStats.rating || '';
            var pPosRaw = p.position || (p.player && p.player.position) || '';
            
            var posMap = (V.state.selectedSport === 'basketball') ? { G:'Guard', F:'Forvet', C:'Pivot', PG:'PG', SG:'SG', SF:'SF', PF:'PF' } : { G:'Kaleci', D:'Defans', M:'Ortasaha', F:'Forvet' };
            var finalPos = posMap[pPosRaw] || pPosRaw || '';
            
            V.state.playerData[pId] = { id: pId, name: pName, pos: finalPos, img: pImg, rating: pRating, stats: pStats };

            var rc = ''; if (pRating) { var r = parseFloat(pRating); rc = r >= 7.5 ? 'rating-high' : (r >= 6.5 ? 'rating-mid' : 'rating-low'); }
            var isFavP = V.state.favPlayers.some(function(fp){ return fp.id === pId; });
            var favIcon = '<div class="ll-fav ' + (isFavP ? 'faved' : '') + '" data-pid="' + pId + '" onclick="V.toggleFavPlayer(\'' + pId + '\', event)">★</div>';
            
            lHtml += '<div class="ll-item" onclick="V.showPlayerModal(\'' + pId + '\')"><div class="ll-num">' + (p.shirtNumber || '-') + '</div>' +

    // Eksik oyuncuları futbol topu ikonu olmadan, listeleme tarzında göster
    var renderMissing = function(missingPlayers) {

        });
        return mHtml + '</div>';
    };

    html += '<div class="team-lineup-wrapper"><div class="team-lineup-header">' + starterLabel + ' - Ev Sahibi</div>';
    if(hp.length>0) {
        // Spor dalına göre saha dizilimini oluştur
        html += renderPitch(hp, hObj.formation);
        var hSubs = hp.filter(function(p){ return p.substitute; });
        if(hSubs.length > 0) html += renderList(hSubs, 'Yedekler');
    }
    if(hm.length > 0) html += renderMissing(hm);
    html += '</div>';
    
    html += '<div class="team-lineup-wrapper" style="margin-top:30px;"><div class="team-lineup-header">' + starterLabel + ' - Deplasman</div>';

        if(aSubs.length > 0) html += renderList(aSubs, 'Yedekler');
    }
    if(am.length > 0) html += renderMissing(am);
    html += '</div>';

    return html;
  },

        // Spor dalını kontrol et

        else { icon = '🟨🟥'; detail = '2. Sarıdan Kırmızı'; }
      }
      else if (type === 'substitution') { icon = '🔄'; var pIn = inc.playerIn ? (inc.playerIn.shortName || inc.playerIn.name) : (pName || '?'); var pOut = inc.playerOut ? (inc.playerOut.shortName || inc.playerOut.name) : '?'; detail = '<span style="color:var(--green)">▲ ' + esc(pIn) + '</span><br><span style="color:var(--red)">▼ ' + esc(pOut) + '</span>'; }
      else if (type === 'period') { icon = '🏁'; detail = esc(inc.text || inc.description || 'Devre / Maç Sonu'); pName = ''; }
      else { icon = 'ℹ️'; detail = esc(inc.text || inc.description || type || ''); }

      var scoreBadge = (inc.homeScore !== undefined && inc.awayScore !== undefined && type === 'goal') 
        ? '<div class="incident-score">' + safeNum(inc.homeScore) + ' - ' + safeNum(inc.awayScore) + '</div>' : '';
        
      var timeStr = inc.time !== undefined && inc.time !== null ? (inc.time<0 ? 'M.Ö.' : inc.time + '\'') : '';

      html += '<div class="incident-row">' +
        '<div class="incident-time">' + timeStr + '</div>' +
        '<div class="incident-icon">' + icon + '</div>' +
        '<div class="incident-details"><div class="incident-player">' + esc(pName) + '</div><div class="incident-desc">' + detail + '</div></div>' +
        scoreBadge +
      '</div>';
    }
    return html + '</div>';
  },
  statsDetailed: function(rawStats) {
    if (!rawStats || rawStats.length === 0) return this.empty('Detaylı istatistik mevcut değil');
    var html = '';
    for (var i = 0; i < rawStats.length; i++) {
      if (rawStats[i].period !== 'ALL') continue;
      var groups = rawStats[i].groups || [];
      for (var g = 0; g < groups.length; g++) {
        html += '<div class="stat-group-title">' + groups[g].groupName + '</div>';
        var items = groups[g].statisticsItems || [];
        for (var s = 0; s < items.length; s++) html += this.statBar({ name: items[s].name, home: items[s].homeValue, away: items[s].awayValue });
      }
    }
    return html || this.empty('Detaylı istatistik mevcut değil');
  }
};

var Search = {
  _timer: null,
  init: function() {
    var input = document.getElementById('searchInput'); if (!input) return;
    input.addEventListener('input', function() {
      var val = input.value.trim();
      if (val.length < 3) { Search.clear(); return; }
      clearTimeout(Search._timer);
      Search._timer = setTimeout(function() { Search.doSearch(val); }, 500);
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === '/' && document.activeElement !== input) { e.preventDefault(); input.focus(); }
      if (e.key === 'Escape') { Search.clear(); input.blur(); }
    });
  },
  doSearch: function(query) {
    var dropdown = document.getElementById('searchDropdown'); if (!dropdown) return;
    dropdown.innerHTML = T.loading('Aranıyor...'); dropdown.classList.add('active');
    V.apiFetch('/api/search/' + encodeURIComponent(V.state.selectedSport) + '?q=' + encodeURIComponent(query)).then(function(data) {
      var teams = data.teams || []; var players = data.players || [];
      if (teams.length === 0 && players.length === 0) { dropdown.innerHTML = '<div class="search-no-result"><div class="snr-icon">🔍</div>"<b>' + esc(query) + '</b>" için sonuç bulunamadı.</div>'; return; }
      var html = '';
      if (teams.length > 0) {
        html += '<div class="search-section-title">TAKIMLAR</div>';
        for (var i = 0; i < Math.min(teams.length, 5); i++) {
          var t = teams[i];
          html += '<div class="search-item" onclick="Search.pickTeam(' + t.id + ')"><img src="' + safeImgUrl(t.img) + '" onerror="this.src=\'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=\'"><div><div class="search-item-name">' + esc(t.name) + '</div><div class="search-item-sub">' + esc(t.tournament || t.country || '') + '</div></div><span class="search-item-badge team">Takım</span></div>';
        }
      }
      if (players.length > 0) {
        html += '<div class="search-section-title">OYUNCULAR</div>';
        for (var j = 0; j < Math.min(players.length, 5); j++) {
          var p = players[j];
          var posMap = { G:'Kaleci', D:'Defans', M:'Ortasaha', F:'Forvet' };
          var posLabel = posMap[p.position] || p.position || '';
          html += '<div class="search-item" onclick="Search.pickPlayer(' + p.id + ')"><img src="' + safeImgUrl(p.img) + '" onerror="this.src=\'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=\'"><div><div class="search-item-name">' + esc(p.name) + '</div><div class="search-item-sub">' + esc(p.teamName || '') + (posLabel ? ' · ' + posLabel : '') + '</div></div><span class="search-item-badge player">Oyuncu</span></div>';
        }
      }
      dropdown.innerHTML = html;
    }).catch(function() { dropdown.classList.remove('active'); });
  },
  pickTeam: function(teamId) {
    Search.clear();
    var panel = document.getElementById('detailPanel'); panel.classList.add('open');
    panel.innerHTML = T.loading('Takım maçları yükleniyor...');
    V.apiFetch('/api/team/' + teamId + '/events').then(function(data) {
      var matches = data.matches || [];
      var html = '<div class="detail-header" style="position:relative"><div class="btn-close-panel" onclick="V.closeDetail()">✕</div><div style="font-size:18px;font-weight:800;text-align:center;padding:10px 0;">Takım Maçları</div></div><div class="detail-content" style="padding:16px;">';
      if (matches.length === 0) html += T.empty('Maç bulunamadı');
      else {
        matches.sort(function(a,b){ return b.timestamp - a.timestamp; });
        var limit = Math.min(10, matches.length);
        for(var i=0; i<limit; i++){
          var m = matches[i];
          var hasScore = m.homeScore !== null && m.homeScore !== undefined;
          var hS = hasScore ? safeNum(m.homeScore) : '-'; var aS = hasScore ? safeNum(m.awayScore) : '-';
          var d = new Date(m.timestamp); var shortDate = d.getDate() + '/' + (d.getMonth()+1);
          html += '<div onclick="V.showDetail(' + m.id + ')" style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;font-size:13px;cursor:pointer;"><div style="color:var(--text3);width:40px;">' + shortDate + '</div><div style="flex:1;text-align:right;">' + esc(m.homeTeam.shortName) + '</div><div style="padding:0 8px;font-weight:800;color:var(--text)">' + hS + '-' + aS + '</div><div style="flex:1;">' + esc(m.awayTeam.shortName) + '</div></div>';
        }
      }
      panel.innerHTML = html + '</div>';
    }).catch(function() { panel.innerHTML = T.empty('Yüklenemedi'); });
  },
  pickPlayer: function(id) { Search.clear(); V.apiFetch('/api/player/' + id).then(function(data){ V.state.playerData[id]=data.player; V.showPlayerModal(id); }); },
  clear: function() {
    var input = document.getElementById('searchInput'); if (input) input.value = '';
    var dropdown = document.getElementById('searchDropdown'); if (dropdown) { dropdown.innerHTML = ''; dropdown.classList.remove('active'); }
  }
};

var Auth = {
  user: null,
  init: function() {
    getSupabase().auth.getSession().then(function(res) {
      if (res.data && res.data.session) { Auth.user = res.data.session.user; Auth.renderUser(); Auth.loadCloudData(); }
      else Auth.renderGuest();
    });
    getSupabase().auth.onAuthStateChange(function(event, session) {
      if (session) { Auth.user = session.user; Auth.renderUser(); if (event === 'SIGNED_IN') Auth.loadCloudData(); }
      else { Auth.user = null; Auth.renderGuest(); }
    });
  },
  showModal: function() { document.getElementById('authModalOverlay').style.display = 'flex'; document.getElementById('authError').textContent = ''; },
  hideModal: function(ev) { if (ev === 'force') { document.getElementById('authModalOverlay').style.display = 'none'; return; } if(ev && ev.target && ev.target.id !== 'authModalOverlay') return; document.getElementById('authModalOverlay').style.display = 'none'; },
  socialLogin: function(provider) {
    getSupabase().auth.signInWithOAuth({
      provider: provider,
      options: { redirectTo: window.location.origin }
    }).then(function(res) {
      if (res.error) document.getElementById('authError').textContent = res.error.message;
      else Auth.hideModal('force');
    });
  },
  logout: function() { getSupabase().auth.signOut(); Auth.renderGuest(); },
  renderGuest: function() {
    var el = document.getElementById('authSection'); if (!el) return;
    el.innerHTML = '<button class="auth-btn" onclick="Auth.showModal()">' +
      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg> <span class="hide-mobile">Giriş Yap / Kayıt Ol</span></button>';
  },
  renderUser: function() {
    var el = document.getElementById('authSection'); if (!el || !this.user) return;
    var meta = this.user.user_metadata || {};
    var email = esc(this.user.email || '');
    var displayName = esc(meta.full_name || meta.name || email.split('@')[0]);
    var avatar = safeImgUrl(meta.avatar_url);
    var avatarHtml = avatar ? '<img class="user-avatar" src="' + avatar + '">' : '<div class="user-avatar">' + displayName.charAt(0).toUpperCase() + '</div>';
    el.innerHTML =
      '<div class="user-info-box" style="display:flex;">' +
        avatarHtml +
        '<div class="user-details">' +
          '<div class="user-name">' + displayName + '</div>' +
          '<div class="user-logout" onclick="Auth.logout()">Çıkış Yap</div>' +
        '</div>' +
      '</div>';
  },
  _saveTimer: null,
  saveCloudData: function() {
    if (!this.user) return;
    var self = this;
    clearTimeout(this._saveTimer);
    this._saveTimer = setTimeout(function() {
      var data = {
        user_id: self.user.id,
        favorites: JSON.stringify(V.state.favs),
        fav_players: JSON.stringify(V.state.favPlayers),
        theme: V.state.theme,
        show_odds: V.state.showOdds,
        hide_scores: V.state.hideScores,
        updated_at: new Date().toISOString()
      };
      getSupabase().from('user_settings').upsert(data, { onConflict: 'user_id' }).then(function(res) {
        if (res.error) console.error('[Auth] Kayıt hatası:', res.error.message);
      });
    }, 2000);
  },
  loadCloudData: function() {
    if (!this.user) return;
    var self = this;
    getSupabase().from('user_settings').select('*').eq('user_id', this.user.id).single().then(function(res) {
      if (res.error || !res.data) return;
      var d = res.data;
      try {
        if (d.favorites) { V.state.favs = JSON.parse(d.favorites); safeStorage.set('vivo_favs', V.state.favs); }
        if (d.fav_players) { V.state.favPlayers = JSON.parse(d.fav_players); safeStorage.set('vivo_fav_players', V.state.favPlayers); }
        if (d.theme) { V.state.theme = d.theme; safeStorage.set('vivo_theme', d.theme); document.documentElement.setAttribute('data-theme', d.theme); }
        if (d.show_odds !== null) { V.state.showOdds = d.show_odds; document.body.classList.toggle('hide-odds', !d.show_odds); V.updateOddsBtn(); }
        if (d.hide_scores !== null) { V.state.hideScores = d.hide_scores; document.body.classList.toggle('hide-scores', d.hide_scores); V.updateHideScoresBtn(); }
        V.loadMatches(); 
      } catch(e) {}
    });
  }
};

function getSupabase() {
  if (typeof supabase === 'undefined') return { auth: { getSession: function(){ return Promise.resolve({}); }, onAuthStateChange: function(){}, signInWithOAuth: function(){ return Promise.resolve({error:'Supabase yok'}); }, signOut: function(){} }, from: function(){ return { upsert: function(){ return Promise.resolve({}); }, select: function(){ return { eq: function(){ return { single: function(){ return Promise.resolve({}); } }; } }; } }; } };
  return supabase.createClient('https://YOUR_SUPABASE_URL.supabase.co', 'YOUR_SUPABASE_ANON_KEY');
}

try { V.init(); Search.init(); } catch(err) { console.error("Başlatılma Hatası:", err); }
</script>
</body>

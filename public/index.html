<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>Vivo Skor | Profesyonel CanlДұ Skor Sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e14; 
  --s1: #151821; 
  --s2: #1c2333; 
  --s3: #242d3d;
  --brand: #3b82f6; 
  --brand-d: rgba(59,130,246,0.15);
  --grn: #22c55e; 
  --red: #ef4444; 
  --ylw: #eab308;
  --t1: #e6edf3; 
  --t2: #8b949e; 
  --t3: #484f58;
  --brd: #222634;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
  font-family: 'Inter', sans-serif; 
  background: var(--bg); 
  color: var(--t1); 
  overflow: hidden; /* DДұЕҹ ekranДұn kaymasДұnДұ engeller, profesyonel web app hissi verir */
}

/* ANA YAPI */
.app { 
  display: flex; 
  width: 100vw; 
  height: 100vh; 
}

/* SOL SABД°T MENГң */
.sidebar { 
  width: 280px; 
  background: var(--s1); 
  border-right: 1px solid var(--brd); 
  display: flex; 
  flex-direction: column; 
  flex-shrink: 0; 
}

.sidebar-header { 
  padding: 30px 24px; 
  border-bottom: 1px solid var(--brd); 
}

.logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
.logo span { color: var(--brand); }

.nav-list { flex: 1; padding: 24px 16px; }

.nav-item { 
  width: 100%; 
  display: flex; 
  align-items: center; 
  gap: 14px; 
  padding: 14px 20px; 
  border-radius: 12px; 
  color: var(--t2); 
  cursor: pointer; 
  border: none; 
  background: none;
  font-size: 14px; 
  font-weight: 600; 
  transition: all 0.2s ease;
  margin-bottom: 8px;
  text-align: left;
}

.nav-item.active { 
  background: var(--brand-d); 
  color: var(--brand); 
}

.nav-item:hover:not(.active) { 
  background: var(--s2); 
  color: var(--t1); 
}

/* SAДһ ANA Д°ГҮERД°K ALANI */
.main-wrapper { 
  flex: 1; 
  display: flex; 
  flex-direction: column; 
  height: 100%; 
  background: var(--bg);
}

.top-header { 
  padding: 20px 40px; 
  background: var(--s1); 
  border-bottom: 1px solid var(--brd);
  display: flex; 
  justify-content: space-between; 
  align-items: center;
}

/* LД°G ЕһERД°DД° */
.scroll-strip { 
  display: flex; 
  gap: 10px; 
  padding: 15px 40px; 
  background: var(--bg); 
  border-bottom: 1px solid var(--brd); 
  overflow-x: auto; 
}

.chip { 
  padding: 10px 20px; 
  border-radius: 10px; 
  font-size: 13px; 
  font-weight: 600; 
  color: var(--t2); 
  background: var(--s1); 
  border: 1px solid var(--brd); 
  cursor: pointer; 
  white-space: nowrap;
  transition: 0.2s;
}

.chip:hover { border-color: var(--t3); }
.chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }

/* MAГҮ LД°STESД° ALANI */
.main-content { 
  flex: 1; 
  overflow-y: auto; 
  padding: 30px 40px; 
}

.matches-container { 
  max-width: 1200px; 
  margin: 0 auto; 
}

/* MAГҮ SATIRI TASARIMI */
.m-row { 
  display: flex; 
  align-items: center; 
  padding: 18px 28px; 
  background: var(--s1); 
  border-radius: 16px; 
  margin-bottom: 12px; 
  border: 1px solid var(--brd); 
  transition: all 0.2s ease;
}

.m-row:hover { 
  border-color: var(--brand); 
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.m-time { width: 80px; }
.m-time .st { font-size: 11px; font-weight: 800; color: var(--t3); text-transform: uppercase; }
.m-time .st.live { color: var(--red); }
.m-time .clk { font-size: 13px; color: var(--t2); margin-top: 5px; }

.m-teams { 
  flex: 1; 
  padding: 0 30px; 
  font-size: 16px; 
  font-weight: 600; 
  display: flex; 
  flex-direction: column; 
  gap: 10px; 
}

.m-teams span { display: flex; align-items: center; gap: 12px; }
.team-crest { width: 24px; height: 24px; object-fit: contain; }

.m-scores { 
  width: 50px; 
  text-align: center; 
  font-size: 18px; 
  font-weight: 800; 
  display: flex; 
  flex-direction: column; 
  gap: 10px; 
}

.m-s { height: 24px; line-height: 24px; }
.m-s.hidden { background: var(--s3); color: transparent; border-radius: 6px; width: 28px; margin: 0 auto; }

.m-fav { 
  width: 50px; 
  font-size: 22px; 
  color: var(--t3); 
  cursor: pointer; 
  border: none; 
  background: none; 
  transition: 0.2s;
}
.m-fav:hover { transform: scale(1.2); }
.m-fav.on { color: var(--ylw); }

/* SPOILER MODU TASARIMI */
.spoiler-bar { 
  display: flex; 
  align-items: center; 
  gap: 15px; 
  background: var(--s2); 
  padding: 10px 20px; 
  border-radius: 12px; 
  cursor: pointer; 
}

.spoiler-info .title { font-size: 13px; font-weight: 700; }
.toggle { width: 44px; height: 24px; border-radius: 12px; background: var(--s3); position: relative; transition: 0.3s; }
.toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: 0.3s; }
.toggle.on { background: var(--brand); }
.toggle.on::after { transform: translateX(20px); }

.empty-state { text-align: center; padding: 100px 0; color: var(--t2); font-size: 14px; }

/* Scrollbar Г–zelleЕҹtirme */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--t3); }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Vivo<span>Skor</span></div>
    </div>
    <nav class="nav-list">
      <button class="nav-item active" id="btn-matches" onclick="App.setMode('matches')">
        <span style="font-size: 20px;">вҡҪ</span> MAГҮLAR
      </button>
      <button class="nav-item" id="btn-favs" onclick="App.setMode('favs')">
        <span style="font-size: 20px;">вҳ…</span> FAVORД°LER
      </button>
    </nav>
  </aside>

  <div class="main-wrapper">
    <header class="top-header">
      <h2 id="pageTitle" style="font-size: 20px; font-weight: 700;">CanlДұ Skorlar</h2>
      <div class="spoiler-bar" id="spoilerBar">
        <div class="spoiler-info"><div class="title">Spoiler Modu</div></div>
        <div class="toggle" id="spoilerToggle"></div>
      </div>
    </header>

    <div class="scroll-strip" id="leagueTabs"></div>

    <main class="main-content">
      <div class="matches-container" id="mainContent">
        <div class="empty-state">Veriler yГјkleniyor...</div>
      </div>
    </main>
  </div>
</div>

<script>
let clientId = localStorage.getItem('vivoskor_client_id');
if (!clientId) { 
  clientId = 'client_' + Math.random().toString(36).substr(2, 9); 
  localStorage.setItem('vivoskor_client_id', clientId); 
}

const LEAGUES = [
  { id: "PL", name: "Premier League", flag: "рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ" },
  { id: "CL", name: "Еһampiyonlar Ligi", flag: "рҹҮӘрҹҮә" },
  { id: "BL1", name: "Bundesliga", flag: "рҹҮ©рҹҮӘ" },
  { id: "SA", name: "Serie A", flag: "рҹҮ®рҹҮ№" },
  { id: "PD", name: "La Liga", flag: "рҹҮӘрҹҮё" }
];

const state = { currentLeague: "PL", spoiler: false, favMode: false, favs: new Set(), cache: {} };

const App = {
  async init() {
    this.content = document.getElementById('mainContent');
    document.getElementById('spoilerBar').onclick = () => {
      state.spoiler = !state.spoiler;
      document.getElementById('spoilerToggle').classList.toggle('on', state.spoiler);
      this.render();
    };
    await this.fetchFavs();
    this.renderTabs();
    this.fetchMatches(state.currentLeague);
  },

  renderTabs() {
    document.getElementById('leagueTabs').innerHTML = LEAGUES.map(l =>
      `<button class="chip ${state.currentLeague === l.id && !state.favMode ? 'active' : ''}" onclick="App.changeLeague('${l.id}')">${l.flag} ${l.name}</button>`
    ).join('');
  },

  changeLeague(id) {
    state.favMode = false; state.currentLeague = id;
    this.updateNavUI();
    this.renderTabs(); 
    this.fetchMatches(id);
  },

  setMode(mode) {
    state.favMode = (mode === 'favs');
    this.updateNavUI();
    this.renderTabs(); 
    this.render();
  },

  updateNavUI() {
    document.getElementById('btn-matches').classList.toggle('active', !state.favMode);
    document.getElementById('btn-favs').classList.toggle('active', state.favMode);
    document.getElementById('pageTitle').innerText = state.favMode ? 'Favori MaГ§larДұm' : 'CanlДұ Skorlar';
  },

  async fetchFavs() {
    try {
      const res = await fetch(`/api/favorites/${clientId}`);
      const data = await res.json();
      if (data.favorites) state.favs = new Set(data.favorites);
    } catch(e) { console.error(e); }
  },

  async fetchMatches(id) {
    this.content.innerHTML = `<div class="empty-state">BaДҹlanДұyor...</div>`;
    try {
      const res = await fetch(`/api/matches/${id}`);
      const json = await res.json();
      state.cache[id] = json.matches;
      this.render();
    } catch(e) { this.content.innerHTML = `<div class="empty-state">Hata: ${e.message}</div>`; }
  },

  render() {
    let matchesToRender = [];
    if (state.favMode) {
      Object.values(state.cache).forEach(mlist => {
        mlist.forEach(m => { if(state.favs.has(m.id)) matchesToRender.push(m); });
      });
      if(matchesToRender.length === 0) return this.content.innerHTML = `<div class="empty-state">HenГјz favori maГ§ДұnДұz yok.</div>`;
    } else {
      matchesToRender = state.cache[state.currentLeague] || [];
      if(matchesToRender.length === 0) return this.content.innerHTML = `<div class="empty-state">MaГ§ bulunamadДұ.</div>`;
    }

    this.content.innerHTML = matchesToRender.map(m => {
      const isFav = state.favs.has(m.id);
      const hideSc = state.spoiler && !isFav;
      const isLive = m.status === 'IN_PLAY' || m.status === 'PAUSED';
      const isFin = m.status === 'FINISHED';
      const timeFmt = new Date(m.utcDate).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
      
      const homeName = m.homeTeam.shortName; const awayName = m.awayTeam.shortName;
      const hs = m.score?.home ?? '-'; const as = m.score?.away ?? '-';

      return `
      <div class="m-row">
        <div class="m-time">
          <div class="st ${isLive?'live':''}">${isFin?'MS':isLive?'CANLI':'SAAT'}</div>
          <div class="clk">${timeFmt}</div>
        </div>
        <div class="m-teams">
          <span><img src="${m.homeTeam.crest}" class="team-crest" onerror="this.style.display='none'"> ${homeName}</span>
          <span><img src="${m.awayTeam.crest}" class="team-crest" onerror="this.style.display='none'"> ${awayName}</span>
        </div>
        <div class="m-scores">
          <div class="m-s ${hideSc?'hidden':''}">${hs}</div>
          <div class="m-s ${hideSc?'hidden':''}">${as}</div>
        </div>
        <button class="m-fav ${isFav?'on':''}" onclick="App.toggleFav(${m.id})">вҳ…</button>
      </div>`;
    }).join('');
  },

  async toggleFav(id) {
    const added = !state.favs.has(id);
    added ? state.favs.add(id) : state.favs.delete(id);
    this.render();
    try { 
      await fetch('/api/favorites', { 
        method: added ? 'POST' : 'DELETE', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ clientId, matchId: id }) 
      }); 
    } catch(e){}
  }
};

App.init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<title>VivoScore</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── KÖK DEĞİŞKENLER & TEMA ─── */
:root {
  --bg: #0d1117; --s1: #161b22; --s2: #1c2333; --s3: #242d3d;
  --brand: #3b82f6; --brand-d: rgba(59,130,246,0.15);
  --grn: #22c55e; --red: #ef4444; --ylw: #eab308;
  --t1: #e6edf3; --t2: #8b949e; --t3: #484f58;
  --brd: #21262d;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--t1); user-select: none; }

/* Mobil Varsayılan Yapı */
.app { width: 100%; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: 60px; width: 100%; }

/* Üst Bar & Spoiler */
.header { padding: 16px; background: var(--bg); border-bottom: 1px solid var(--brd); flex-shrink: 0; }
.top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.logo { font-size: 20px; font-weight: 800; }
.logo span { color: var(--brand); }
.status-pill { font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: 700; border: 1px solid; transition: 0.3s; }
.status-pill.live { background: rgba(239,68,68,0.15); color: var(--red); border-color: rgba(239,68,68,0.3); }
.status-pill.cache { background: rgba(59,130,246,0.12); color: var(--brand); border-color: rgba(59,130,246,0.3); }
.status-pill.idle { background: var(--s2); color: var(--t3); border-color: var(--brd); }

.spoiler-bar { display: flex; justify-content: space-between; align-items: center; background: var(--s1); padding: 10px 14px; border-radius: 10px; border: 1px solid var(--brd); cursor: pointer; }
.spoiler-info .title { font-size: 12px; font-weight: 600; }
.spoiler-info .desc  { font-size: 10px; color: var(--t3); margin-top: 2px; }
.toggle { width: 42px; height: 24px; border-radius: 12px; background: var(--s3); position: relative; transition: 0.3s; flex-shrink: 0;}
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: 0.3s; }
.toggle.on { background: var(--brand); }
.toggle.on::after { transform: translateX(18px); }

/* Lig Sekmeleri */
.scroll-strip { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; border-bottom: 1px solid var(--brd); flex-shrink: 0; }
.chip { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 600; color: var(--t2); background: var(--s1); border: 1px solid var(--brd); white-space: nowrap; cursor: pointer; }
.chip:hover { background: var(--s2); }
.chip.active { background: var(--brand-d); color: var(--brand); border: 1px solid var(--brand); }

/* İçerik (Maçlar) */
.main-content { flex: 1; overflow-y: auto; }
.lg-hdr { padding: 12px 16px 6px; font-size: 11px; font-weight: 700; color: var(--t2); background: var(--bg); position: sticky; top: 0; z-index: 5; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--brd); }
.m-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--brd); cursor: pointer; transition: 0.2s; }
.m-row:hover { background: var(--s1); }
.m-row.live-row { border-left: 3px solid var(--red); background: linear-gradient(90deg, rgba(239,68,68,0.05) 0%, transparent 100%); }

.m-time { width: 48px; text-align: center; flex-shrink: 0; }
.m-time .st { font-size: 10px; font-weight: 700; }
.m-time .st.live { color: var(--red); animation: pulse 1.5s infinite; }
.m-time .clk { font-size: 10px; color: var(--t3); margin-top: 3px; }
.m-time .minute { font-size: 9px; color: var(--red); margin-top: 1px; font-weight: 700; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.m-teams { flex: 1; padding: 0 10px; font-size: 13px; font-weight: 500; display: flex; flex-direction: column; gap: 6px; }
.m-teams span { display: flex; align-items: center; gap: 8px; }
.team-crest { width: 16px; height: 16px; object-fit: contain; }

.m-scores { width: 32px; text-align: center; font-size: 13px; font-weight: 700; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.m-s { height: 18px; line-height: 18px; }
.m-s.hidden { visibility: hidden; background: var(--s2); border-radius: 4px; }
.m-s.winning { color: var(--grn); }

.m-fav { width: 40px; text-align: center; font-size: 18px; color: var(--t3); cursor: pointer; border: none; background: none; transition: 0.2s; flex-shrink: 0; }
.m-fav:hover { transform: scale(1.2); }
.m-fav.on { color: var(--ylw); }

.empty-state { text-align: center; padding: 48px 24px; color: var(--t2); font-size: 13px; }
.loader { border: 3px solid var(--s2); border-top: 3px solid var(--brand); border-radius: 50%; width: 28px; height: 28px; animation: spin 0.9s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Menü (Mobil: Altta, PC: Solda) */
.app-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); border-top: 1px solid var(--brd); display: flex; z-index: 50; }
.nav-item { flex: 1; padding: 12px 0; text-align: center; color: var(--t3); cursor: pointer; border: none; background: none; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
.nav-item .icon { font-size: 20px; margin-bottom: 4px; }
.nav-item .lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; }
.nav-item:hover { color: var(--t1); }
.nav-item.active { color: var(--brand); }

/* TOAST */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--s1); border: 1px solid var(--brd); color: var(--t1); font-size: 12px; font-weight: 500; padding: 10px 18px; border-radius: 20px; opacity: 0; transition: 0.3s; z-index: 100; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ════════════════════════════════════════════════════════
   MASAÜSTÜ (DESKTOP) EKRANLAR İÇİN PROFESYONEL GÖRÜNÜM
════════════════════════════════════════════════════════ */
@media (min-width: 768px) {
  body { background: #05080b; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2vh 0; }
  
  .app { 
    flex-direction: row; /* Menüyü sola, içeriği sağa al */
    max-width: 1100px; 
    width: 95%; 
    height: 90vh; 
    border-radius: 16px; 
    border: 1px solid var(--brd); 
    box-shadow: 0 20px 60px rgba(0,0,0,0.6); 
  }
  
  .app-nav { 
    position: static; 
    width: 240px; 
    flex-direction: column; 
    border-top: none; 
    border-right: 1px solid var(--brd); 
    background: var(--s1); 
    padding: 24px 12px; 
  }
  
  .nav-item { 
    flex: none; 
    flex-direction: row; 
    padding: 16px 20px; 
    border-radius: 12px; 
    margin-bottom: 8px; 
  }
  .nav-item .icon { margin-bottom: 0; margin-right: 16px; font-size: 22px; }
  .nav-item .lbl { font-size: 13px; }
  .nav-item:hover { background: var(--s2); }
  .nav-item.active { background: var(--brand-d); }

  .main-panel { padding-bottom: 0; }
  .header { padding: 24px 32px; border-bottom: 1px solid var(--s2); }
  .scroll-strip { padding: 16px 32px; }
  .lg-hdr { padding: 14px 32px; font-size: 12px; }
  
  .m-row { padding: 18px 32px; }
  .m-teams { font-size: 15px; gap: 8px; }
  .team-crest { width: 22px; height: 22px; }
  .m-scores { font-size: 15px; gap: 8px; }
  .m-time { width: 60px; }
  .m-time .st { font-size: 12px; }
  .m-time .clk { font-size: 12px; }
  
  .toast { bottom: 40px; }
}
</style>
</head>
<body>

<div class="app">
  
  <nav class="app-nav">
    <div style="padding: 0 20px 40px; display: none;" id="desktopLogo">
      <div class="logo" style="font-size: 24px;">Vivo<span>Score</span></div>
    </div>

    <button class="nav-item active" onclick="App.setMode('matches')">
      <span class="icon">⚽</span><span class="lbl">MAÇLAR</span>
    </button>
    <button class="nav-item" onclick="App.setMode('favs')">
      <span class="icon">★</span><span class="lbl">FAVORİLER</span>
    </button>
  </nav>

  <div class="main-panel">
    <header class="header">
      <div class="top-row">
        <div class="logo" id="mobileLogo">Vivo<span>Score</span></div>
        <div class="status-pill idle" id="statusPill">—</div>
      </div>
      <div class="spoiler-bar" id="spoilerBar">
        <div class="spoiler-info">
          <div class="title">Spoiler Modu</div>
          <div class="desc">Skorları gizle — favoriler hariç</div>
        </div>
        <div class="toggle" id="spoilerToggle"></div>
      </div>
    </header>

    <div class="scroll-strip" id="leagueTabs"></div>

    <main class="main-content" id="mainContent">
      <div class="empty-state">
        <div class="loader"></div>
        <div>Sistem Başlatılıyor...</div>
      </div>
    </main>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// Ekran genişliğine göre logoları göster/gizle (Görsel hiyerarşi için)
if (window.innerWidth >= 768) {
  document.getElementById('desktopLogo').style.display = 'block';
  document.getElementById('mobileLogo').style.display = 'none';
}

let clientId = localStorage.getItem('vivoscore_client_id');
if (!clientId) { clientId = 'client_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('vivoscore_client_id', clientId); }

const LEAGUES = [
  { id: "PL", name: "Premier League", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
  { id: "CL", name: "Şampiyonlar Ligi", flag: "🇪🇺" },
  { id: "BL1", name: "Bundesliga", flag: "🇩🇪" },
  { id: "SA", name: "Serie A", flag: "🇮🇹" },
  { id: "PD", name: "La Liga", flag: "🇪🇸" }
];

const state = { currentLeague: "PL", spoiler: false, favMode: false, favs: new Set(), cache: {} };

const App = {
  async init() {
    this.content = document.getElementById('mainContent');
    this.statusPill = document.getElementById('statusPill');
    
    document.getElementById('spoilerBar').onclick = () => {
      state.spoiler = !state.spoiler;
      document.getElementById('spoilerToggle').classList.toggle('on', state.spoiler);
      this.toast(state.spoiler ? '🙈 Spoiler modu açık' : '👁 Skorlar görünür');
      this.render();
    };

    await this.fetchFavs();
    this.renderTabs();
    this.fetchMatches(state.currentLeague);

    setInterval(() => {
      if (!state.favMode) {
        this.fetchMatches(state.currentLeague, true);
      }
    }, 60000);
  },

  toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  },

  renderTabs() {
    document.getElementById('leagueTabs').innerHTML = LEAGUES.map(l =>
      `<button class="chip ${state.currentLeague === l.id && !state.favMode ? 'active' : ''}" onclick="App.changeLeague('${l.id}')">${l.flag} ${l.name}</button>`
    ).join('');
  },

  changeLeague(id) {
    state.favMode = false; state.currentLeague = id;
    document.querySelectorAll('.nav-item')[0].classList.add('active');
    document.querySelectorAll('.nav-item')[1].classList.remove('active');
    this.renderTabs(); 
    this.fetchMatches(id);
  },

  setMode(mode) {
    state.favMode = (mode === 'favs');
    document.querySelectorAll('.nav-item')[0].classList.toggle('active', !state.favMode);
    document.querySelectorAll('.nav-item')[1].classList.toggle('active', state.favMode);
    this.renderTabs(); 
    this.render();
  },

  async fetchFavs() {
    try {
      const res = await fetch(`/api/favorites/${clientId}`);
      const data = await res.json();
      if (data.favorites) state.favs = new Set(data.favorites);
    } catch(e) { console.error(e); }
  },

  async fetchMatches(id, isAutoRefresh = false) {
    if (!isAutoRefresh) this.content.innerHTML = `<div class="empty-state"><div class="loader"></div>Bağlanıyor...</div>`;
    this.statusPill.className = "status-pill idle"; this.statusPill.textContent = "YÜKLENİYOR";
    
    try {
      const res = await fetch(`/api/matches/${id}`);
      const json = await res.json();
      state.cache[id] = json.matches;
      
      const hasLive = json.matches.some(m => m.status === 'IN_PLAY' || m.status === 'PAUSED');
      this.statusPill.className = `status-pill ${hasLive ? 'live' : 'cache'}`;
      this.statusPill.textContent = hasLive ? 'CANLI' : 'GÜNCEL';
      
      this.render();
    } catch(e) { 
      this.content.innerHTML = `<div class="empty-state">Hata: ${e.message}</div>`; 
      this.statusPill.className = "status-pill idle"; this.statusPill.textContent = "HATA";
    }
  },

  render() {
    let matchesToRender = [];
    if (state.favMode) {
      Object.values(state.cache).forEach(mlist => {
        mlist.forEach(m => { if(state.favs.has(m.id)) matchesToRender.push(m); });
      });
      if(matchesToRender.length === 0) return this.content.innerHTML = `<div class="empty-state">Favori maçınız yok.</div>`;
    } else {
      matchesToRender = state.cache[state.currentLeague] || [];
      if(matchesToRender.length === 0) return this.content.innerHTML = `<div class="empty-state">Maç bulunamadı.</div>`;
    }

    let html = `<div class="lg-hdr">${state.favMode ? '⭐ FAVORİLERİN' : LEAGUES.find(l=>l.id===state.currentLeague).name}</div>`;
    
    html += matchesToRender.map(m => {
      const isFav = state.favs.has(m.id);
      const hideSc = state.spoiler && !isFav;
      const isLive = m.status === 'IN_PLAY' || m.status === 'PAUSED';
      const isFin = m.status === 'FINISHED';
      const timeFmt = new Date(m.utcDate).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
      
      const homeName = m.homeTeam.shortName; const awayName = m.awayTeam.shortName;
      const hs = m.score?.home ?? '-'; const as = m.score?.away ?? '-';
      const homeWin = isFin && typeof hs === 'number' && typeof as === 'number' && hs > as;
      const awayWin = isFin && typeof hs === 'number' && typeof as === 'number' && as > hs;

      return `
      <div class="m-row ${isLive ? 'live-row' : ''}">
        <div class="m-time">
          <div class="st ${isLive?'live':(isFin?'':'sched')}">${isFin?'MS':isLive?'CANLI':'SAAT'}</div>
          <div class="clk">${timeFmt}</div>
          ${isLive && m.minute ? `<div class="minute">${m.minute}'</div>` : ''}
        </div>
        <div class="m-teams">
          <span><img src="${m.homeTeam.crest}" class="team-crest" onerror="this.style.display='none'"> ${homeName}</span>
          <span><img src="${m.awayTeam.crest}" class="team-crest" onerror="this.style.display='none'"> ${awayName}</span>
        </div>
        <div class="m-scores">
          <div class="m-s ${hideSc?'hidden':(homeWin?'winning':'')}">${hideSc?'':hs}</div>
          <div class="m-s ${hideSc?'hidden':(awayWin?'winning':'')}">${hideSc?'':as}</div>
        </div>
        <button class="m-fav ${isFav?'on':''}" onclick="App.toggleFav(${m.id})">★</button>
      </div>`;
    }).join('');
    
    this.content.innerHTML = html;
  },

  async toggleFav(id) {
    const added = !state.favs.has(id);
    added ? state.favs.add(id) : state.favs.delete(id);
    this.render();
    try { await fetch('/api/favorites', { method: added ? 'POST' : 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ clientId, matchId: id }) }); } catch(e){}
  }
};

App.init();
</script>
</body>
</html>

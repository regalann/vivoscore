<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VivoScore | SofaScore Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --s1: #151821; --brd: #222634; --brand: #3b82f6; --red: #ef4444; --t1: #e6edf3; --t2: #8b949e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--t1); overflow: hidden; }
        
        .app { display: flex; width: 100vw; height: 100vh; }
        
        /* Sol Menü */
        .sidebar { width: 250px; background: var(--s1); border-right: 1px solid var(--brd); padding: 20px; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; font-weight: 600; color: var(--t2); }
        .nav-item.active { background: rgba(59,130,246,0.1); color: var(--brand); }

        /* Orta Maç Listesi */
        .main-content { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--brd); }
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; }
        .m-row { display: flex; align-items: center; padding: 15px; background: var(--s1); border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .m-row:hover { border-color: var(--brand); }

        /* Sağ Detay Paneli */
        .details-panel { width: 380px; background: var(--s1); overflow-y: auto; padding: 25px; display: flex; flex-direction: column; }
        
        /* İstatistik Çubukları */
        .stat-bar { height: 6px; background: #242d3d; border-radius: 3px; display: flex; overflow: hidden; margin: 8px 0 15px; }
        .bar-h { background: var(--brand); height: 100%; transition: 0.5s; }
        .bar-a { background: var(--red); height: 100%; transition: 0.5s; }
        
        .rating-badge { padding: 2px 6px; border-radius: 4px; font-weight: 800; font-size: 11px; color: #000; }
        .team-logo { width: 20px; height: 20px; object-fit: contain; }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <h2 style="margin-bottom:30px;">Vivo<span>Score</span></h2>
        <div class="nav-item active" onclick="App.setMode('matches')">⚽ Maçlar</div>
        <div class="nav-item" onclick="App.setMode('favs')">⭐ Favoriler</div>
    </aside>

    <main class="main-content">
        <div style="padding:20px; border-bottom:1px solid var(--brd);" id="leagueTabs"></div>
        <div class="scroll-area" id="matchList"></div>
    </main>

    <aside class="details-panel" id="matchDetails">
        <div style="text-align:center; padding-top:100px; color:var(--t2);">Detay için bir maça tıkla.</div>
    </aside>
</div>

<script>
const App = {
    state: { currentLeague: 'PL', matches: [] },

    async init() {
        this.renderTabs();
        await this.fetchMatches('PL');
    },

    renderTabs() {
        const leagues = [{id:'PL', n:'Premier League'}, {id:'CL', n:'Champions League'}, {id:'SA', n:'Serie A'}];
        document.getElementById('leagueTabs').innerHTML = leagues.map(l => 
            `<button onclick="App.fetchMatches('${l.id}')" style="margin-right:10px; padding:8px 15px; border-radius:20px; border:1px solid var(--brd); background:none; color:white; cursor:pointer;">${l.n}</button>`
        ).join('');
    },

    async fetchMatches(id) {
        document.getElementById('matchList').innerHTML = "Yükleniyor...";
        const res = await fetch(`/api/matches/${id}`);
        const data = await res.json();
        this.state.matches = data.matches;
        this.renderList();
    },

    renderList() {
        document.getElementById('matchList').innerHTML = this.state.matches.map(m => `
            <div class="m-row" onclick="App.showDetails(${m.id})">
                <div style="width:50px; font-size:12px; color:var(--t2);">${new Date(m.utcDate).getHours()}:${new Date(m.utcDate).getMinutes()}</div>
                <div style="flex:1;">
                    <div style="margin-bottom:5px;"><img src="${m.homeTeam.crest}" class="team-logo"> ${m.homeTeam.name}</div>
                    <div><img src="${m.awayTeam.crest}" class="team-logo"> ${m.awayTeam.name}</div>
                </div>
                <div style="text-align:right; font-weight:800;">
                    <div>${m.score.home ?? '-'}</div>
                    <div>${m.score.away ?? '-'}</div>
                </div>
            </div>
        `).join('');
    },

    async showDetails(id) {
        const panel = document.getElementById('matchDetails');
        panel.innerHTML = "Veriler çekiliyor...";
        const res = await fetch(`/api/match-details/${id}`);
        const data = await res.json();
        
        let html = `<h3>Maç İstatistikleri</h3><br>`;
        if(data.stats && data.stats.statistics) {
            data.stats.statistics[0].groups[0].statisticsItems.forEach(item => {
                const total = parseFloat(item.homeValue) + parseFloat(item.awayValue);
                const hP = total === 0 ? 50 : (parseFloat(item.homeValue) / total) * 100;
                html += `
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <span>${item.home}</span><span>${item.name}</span><span>${item.away}</span>
                    </div>
                    <div class="stat-bar"><div class="bar-h" style="width:${hP}%"></div><div class="bar-a" style="flex:1"></div></div>
                `;
            });
        }
        panel.innerHTML = html;
    }
};
App.init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<title>Vivo Skor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117; --s1: #161b22; --s2: #1c2333; --s3: #242d3d;
  --brand: #3b82f6; --brand-d: rgba(59,130,246,0.15);
  --grn: #22c55e; --red: #ef4444; --ylw: #eab308;
  --t1: #e6edf3; --t2: #8b949e; --t3: #484f58;
  --brd: #21262d;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--t1); user-select: none; }
.app { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.header { padding: 16px; background: var(--bg); border-bottom: 1px solid var(--brd); }
.top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.logo { font-size: 20px; font-weight: 800; }
.logo span { color: var(--brand); }
.spoiler-bar { display: flex; justify-content: space-between; align-items: center; background: var(--s1); padding: 10px 14px; border-radius: 10px; border: 1px solid var(--brd); cursor: pointer; }
.spoiler-info .title { font-size: 12px; font-weight: 600; }
.spoiler-info .desc  { font-size: 10px; color: var(--t3); }
.toggle { width: 42px; height: 24px; border-radius: 12px; background: var(--s3); position: relative; transition: 0.3s; }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: 0.3s; }
.toggle.on { background: var(--brand); }
.toggle.on::after { transform: translateX(18px); }
.scroll-strip { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; border-bottom: 1px solid var(--brd); }
.chip { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 600; color: var(--t2); background: var(--s1); border: 1px solid var(--brd); white-space: nowrap; cursor: pointer; border:none;}
.chip.active { background: var(--brand-d); color: var(--brand); border: 1px solid var(--brand); }
.main-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
.m-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--brd); cursor: pointer; }
.m-time { width: 48px; text-align: center; }
.m-time .st { font-size: 10px; font-weight: 700; color: var(--t3); }
.m-time .st.live { color: var(--red); }
.m-time .clk { font-size: 10px; color: var(--t3); margin-top: 3px; }
.m-teams { flex: 1; padding: 0 10px; font-size: 13px; font-weight: 500; display: flex; flex-direction: column; gap: 5px; }
.m-teams span { display: flex; align-items: center; gap: 6px; }
.team-crest { width: 16px; height: 16px; object-fit: contain; }
.m-scores { width: 32px; text-align: center; font-size: 13px; font-weight: 700; display: flex; flex-direction: column; gap: 5px; }
.m-s { height: 18px; line-height: 18px; }
.m-s.hidden { visibility: hidden; background: var(--s2); border-radius: 4px; }
.m-fav { width: 36px; text-align: center; font-size: 18px; color: var(--t3); cursor: pointer; border: none; background: none;}
.m-fav.on { color: var(--ylw); }
.empty-state { text-align: center; padding: 48px 24px; color: var(--t2); font-size: 12px; }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg); border-top: 1px solid var(--brd); display: flex; }
.nav-item { flex: 1; padding: 12px 0; text-align: center; color: var(--t3); cursor: pointer; border:none; background:none;}
.nav-item .icon { font-size: 20px; display: block; }
.nav-item .lbl { font-size: 9px; font-weight: 700; }
.nav-item.active { color: var(--brand); }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="top-row"><div class="logo">Vivo<span>Skor</span></div></div>
    <div class="spoiler-bar" id="spoilerBar">
      <div class="spoiler-info"><div class="title">Spoiler Modu</div><div class="desc">Skorları gizle — favoriler hariç</div></div>
      <div class="toggle" id="spoilerToggle"></div>
    </div>
  </header>
  <div class="scroll-strip" id="leagueTabs"></div>
  <main class="main-content" id="mainContent"><div class="empty-state">Yükleniyor...</div></main>
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="App.setMode('matches')"><span class="icon">⚽</span><span class="lbl">MAÇLAR</span></button>
    <button class="nav-item" onclick="App.setMode('favs')"><span class="icon">★</span><span class="lbl">FAVORİLER</span></button>
  </nav>
</div>

<script>
let clientId = localStorage.getItem('vivoskor_client_id');
if (!clientId) { clientId = 'client_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('vivoskor_client_id', clientId); }

const LEAGUES = [
  { id: "PL", name: "Premier League", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
  { id: "CL", name: "Şampiyonlar Ligi", flag: "🇪🇺" },
  { id: "BL1", name: "Bundesliga", flag: "🇩🇪" },
  { id: "SA", name: "Serie A", flag: "🇮🇹" },
  { id: "PD", name: "La Liga", flag: "🇪🇸" }
];

const state = { currentLeague: "PL", spoiler: false, favMode: false, favs: new Set(), cache: {} };

const App = {
  async init() {
    this.content = document.getElementById('mainContent');
    document.getElementById('spoilerBar').onclick = () => {
      state.spoiler = !state.spoiler;
      document.getElementById('spoilerToggle').classList.toggle('on', state.spoiler);
      this.render();
    };
    await this.fetchFavs();
    this.renderTabs();
    this.fetchMatches(state.currentLeague);
  },

  renderTabs() {
    document.getElementById('leagueTabs').innerHTML = LEAGUES.map(l =>
      `<button class="chip ${state.currentLeague === l.id && !state.favMode ? 'active' : ''}" onclick="App.changeLeague('${l.id}')">${l.flag} ${l.name}</button>`
    ).join('');
  },

  changeLeague(id) {
    state.favMode = false; state.currentLeague = id;
    document.querySelectorAll('.nav-item')[0].classList.add('active');
    document.querySelectorAll('.nav-item')[1].classList.remove('active');
    this.renderTabs(); this.fetchMatches(id);
  },

  setMode(mode) {
    state.favMode = (mode === 'favs');
    document.querySelectorAll('.nav-item')[0].classList.toggle('active', !state.favMode);
    document.querySelectorAll('.nav-item')[1].classList.toggle('active', state.favMode);
    this.renderTabs(); this.render();
  },

  async fetchFavs() {
    try {
      const res = await fetch(`/api/favorites/${clientId}`);
      const data = await res.json();
      if (data.favorites) state.favs = new Set(data.favorites);
    } catch(e) { console.error(e); }
  },

  async fetchMatches(id) {
    this.content.innerHTML = `<div class="empty-state">Bağlanıyor...</div>`;
    try {
      const res = await fetch(`/api/matches/${id}`);
      const json = await res.json();
      state.cache[id] = json.matches;
      this.render();
    } catch(e) { this.content.innerHTML = `<div class="empty-state">Hata: ${e.message}</div>`; }
  },

  render() {
    let matchesToRender = [];
    if (state.favMode) {
      Object.values(state.cache).forEach(mlist => {
        mlist.forEach(m => { if(state.favs.has(m.id)) matchesToRender.push(m); });
      });
      if(matchesToRender.length === 0) return this.content.innerHTML = `<div class="empty-state">Favori maçınız yok.</div>`;
    } else {
      matchesToRender = state.cache[state.currentLeague] || [];
      if(matchesToRender.length === 0) return this.content.innerHTML = `<div class="empty-state">Maç bulunamadı.</div>`;
    }

    this.content.innerHTML = matchesToRender.map(m => {
      const isFav = state.favs.has(m.id);
      const hideSc = state.spoiler && !isFav;
      const isLive = m.status === 'IN_PLAY' || m.status === 'PAUSED';
      const isFin = m.status === 'FINISHED';
      const timeFmt = new Date(m.utcDate).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
      
      const homeName = m.homeTeam.shortName; const awayName = m.awayTeam.shortName;
      const hs = m.score?.home ?? '-'; const as = m.score?.away ?? '-';

      return `
      <div class="m-row">
        <div class="m-time"><div class="st ${isLive?'live':''}">${isFin?'MS':isLive?'CANLI':'SAAT'}</div><div class="clk">${timeFmt}</div></div>
        <div class="m-teams">
          <span><img src="${m.homeTeam.crest}" class="team-crest" onerror="this.style.display='none'"> ${homeName}</span>
          <span><img src="${m.awayTeam.crest}" class="team-crest" onerror="this.style.display='none'"> ${awayName}</span>
        </div>
        <div class="m-scores"><div class="m-s ${hideSc?'hidden':''}">${hs}</div><div class="m-s ${hideSc?'hidden':''}">${as}</div></div>
        <button class="m-fav ${isFav?'on':''}" onclick="App.toggleFav(${m.id})">★</button>
      </div>`;
    }).join('');
  },

  async toggleFav(id) {
    const added = !state.favs.has(id);
    added ? state.favs.add(id) : state.favs.delete(id);
    this.render();
    try { await fetch('/api/favorites', { method: added ? 'POST' : 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ clientId, matchId: id }) }); } catch(e){}
  }
};

App.init();
</script>
</body>
</html>

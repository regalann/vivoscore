    var l = m.status === 'live'; var sId = safeNum(m.id); var min = m.minute||'';
    var hs = m.homeScore !== null ? m.homeScore : '-'; var as = m.homeScore !== null ? m.awayScore : '-';
    var oHtml = (m.status === 'scheduled') ? '<div class="match-odds-wrapper empty" data-matchid="'+sId+'" data-mname="'+encodeURIComponent(m.homeTeam.name+'-'+m.awayTeam.name)+'"></div>' : '<div class="match-odds-wrapper empty"></div>';
    return '<div class="match-card' + (l?' live-card':'') + '" data-match="'+sId+'"><div class="match-time">' + (l?'<span class="minute-badge">'+esc(min)+'</span>':esc(m.time)) + '</div>' +
      '<div class="match-info-area" onclick="V.showDetail('+sId+')"><div class="match-teams"><div class="team-row"><img class="team-logo" src="'+safeImgUrl(m.homeTeam.img)+'"><span class="team-name">'+esc(m.homeTeam.shortName)+'</span></div><div class="team-row"><img class="team-logo" src="'+safeImgUrl(m.awayTeam.img)+'"><span class="team-name">'+esc(m.awayTeam.shortName)+'</span></div></div>' +
      oHtml + '<div class="match-score-wrap"><div class="match-score"><div class="score-num'+(l?' live-score':'')+'">'+hs+'</div><div class="score-num'+(l?' live-score':'')+'">'+as+'</div></div></div></div>' +
      '<div class="match-fav" onclick="V.toggleFav('+sId+',event)">★</div></div>';
  },
  leagueGroup: function(n, id, ms) {
    var c = ''; ms.forEach(function(m){ c += T.matchCard(m); });
    return '<div class="league-group" id="lg-' + id + '"><div class="league-header" onclick="V.toggleLeague(\'lg-' + id + '\')"><span style="flex:1;">' + esc(n) + '</span></div><div class="league-matches">' + c + '</div></div>';
  },
  statsDetailed: function(rs) {
    var h = '';
    rs.forEach(function(r) {
      if (r.period !== 'ALL') return;
      (r.groups || []).forEach(function(g) {
        h += '<div class="stat-group-title">' + g.groupName + '</div>';
        (g.statisticsItems || []).forEach(function(i) {
          h += '<div class="stat-row"><div class="stat-labels"><span class="stat-val">'+esc(i.homeValue)+'</span><span class="stat-name">'+esc(i.name)+'</span><span class="stat-val">'+esc(i.awayValue)+'</span></div></div>';
        });
      });
    });
    return h || this.empty('İstatistik yok.');
  },
  lineups: function(d) {
    if(!d || (!d.home && !d.away)) return this.empty('Kadro yok.');
    var h = '<div class="team-lineup-wrapper"><div class="team-lineup-header">Ev Sahibi</div><div class="lineup-list">';
    var hp = (d.home&&d.home.players)?d.home.players:[]; hp.forEach(function(p){ var id=(p.player&&p.player.id)||''; var nm=p.name||(p.player&&p.player.name)||''; var num=p.number||p.shirtNumber||'-'; V.state.playerData[id] = {id:id, name:nm, pos:(p.player&&p.player.position)||'', img:'', rating:'', stats:{}}; h += '<div class="ll-item" onclick="V.showPlayerModal(\''+id+'\')"><div class="ll-num">'+num+'</div><div class="ll-info"><div class="ll-name">'+esc(nm)+'</div></div></div>'; });
    h += '</div></div><div class="team-lineup-wrapper"><div class="team-lineup-header">Deplasman</div><div class="lineup-list">';
    var ap = (d.away&&d.away.players)?d.away.players:[]; ap.forEach(function(p){ var id=(p.player&&p.player.id)||''; var nm=p.name||(p.player&&p.player.name)||''; var num=p.number||p.shirtNumber||'-'; V.state.playerData[id] = {id:id, name:nm, pos:(p.player&&p.player.position)||'', img:'', rating:'', stats:{}}; h += '<div class="ll-item" onclick="V.showPlayerModal(\''+id+'\')"><div class="ll-num">'+num+'</div><div class="ll-info"><div class="ll-name">'+esc(nm)+'</div></div></div>'; });
    h += '</div></div>'; return h;
  },
  incidents: function(incs) {
    var h = '<div class="incident-list">';
    incs.forEach(function(i) {
      var time = i.time || ''; var p = i.player ? i.player.name : i.playerName || ''; var typ = i.incidentType || i.type || '';
      h += '<div class="incident-row"><div class="incident-time">'+time+'\'</div><div class="incident-details"><div class="incident-player">'+esc(p)+'</div><div class="incident-desc">'+esc(typ)+'</div></div></div>';
    });
    return h + '</div>';
  }
};

var Search = {
  t: null,
  init: function() {
    var i = document.getElementById('searchInput');
    if(i) i.addEventListener('input', function() { clearTimeout(Search.t); if(i.value.length>2) Search.t = setTimeout(function(){ Search.doSearch(i.value); }, 500); else Search.close(); });
  },
  doSearch: function(q) {
    var dd = document.getElementById('searchDropdown'); if(!dd)return; dd.innerHTML = T.loading('Aranıyor...'); dd.classList.add('active');
    V.apiFetch('/api/search/football?q=' + encodeURIComponent(q)).then(function(d) {
      var h = '';
      if(d.teams && d.teams.length>0) { h += '<div class="search-section-title">TAKIMLAR</div>'; d.teams.forEach(function(t) { h += '<div class="search-item"><img src="'+safeImgUrl(t.img)+'"><div class="search-item-info"><div class="search-item-name">'+esc(t.name)+'</div></div></div>'; }); }
      if(d.players && d.players.length>0) { h += '<div class="search-section-title">OYUNCULAR</div>'; d.players.forEach(function(p) { h += '<div class="search-item"><img src="'+safeImgUrl(p.img)+'"><div class="search-item-info"><div class="search-item-name">'+esc(p.name)+'</div></div></div>'; }); }
      dd.innerHTML = h || '<div class="search-no-result">Sonuç bulunamadı.</div>';
    }).catch(function(){ dd.innerHTML = '<div class="search-no-result">Hata.</div>'; });
  },
  close: function() { var d = document.getElementById('searchDropdown'); if(d) d.classList.remove('active'); },
  clear: function() { var i = document.getElementById('searchInput'); if(i) i.value=''; this.close(); }
};

V.init(); Search.init();
</script>
</body>
</html>
